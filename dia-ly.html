50, "text": "Hướng chủ yếu phát triển cây ăn quả ở Đồng bằng sông Cửu Long là", "options": {"A": "Tăng năng suất, sử dụng các kĩ thuật mới", "B": "Phát triển nguồn lao động, tăng sản lượng", "C": "Nâng cao chất lượng, mở rộng thị trường", "D": "Phân bố sản xuất hợp lý, sử dụng giống tốt"}, "correct": "C"}, {"id": 51, "text": "Phân bố nông nghiệp ở Đồng bằng sông Cửu Long hiện nay có sự thay đổi chủ yếu do", "options": {"A": "Xâm nhập mặn, hạn hán đe dọa ngày càng nhiều", "B": "Lợi thế tài nguyên, thiên tai mỗi vùng khác nhau", "C": "Phát triển sản xuất hàng hóa, đa dạng nông sản", "D": "Có nhiều loại đất, nguồn nước ngọt bị suy giảm"}, "correct": "A"}, {"id": 52, "text": "Thủy chế nước sông Cửu Long khá điều hòa chủ yếu do nguyên\nnhân nào sau đây?", "options": {"A": "Đặc điểm của lưu vực, trắc diện và điều tiết của hồ", "B": "Địa hình bằng phẳng, nhiều hồ, sông suối, mưa lớn", "C": "Chảy qua nhiều quốc gia, mưa lớn và nhiều phụ lưu", "D": "Nước sông theo mùa, chảy trên nhiều miền khí hậu"}, "correct": "A"}, {"id": 53, "text": "Nguyên nhân chủ yếu dẫn đến việc đồng bằng sông Cửu Long\nkhông phù hợp đắp để để ngăn lũ là", "options": {"A": "lượng phù sa giảm dần, mua khô rất sâu sắc, lũ tương đối điều hòa và kéo dài", "B": "địa chất yếu, bằng phẳng, nước lớn vào mùa lũ, tác động của thủy triều, sông", "C": "lũ mang lại nhiều lợi ích, có nước thau chua, rửa phèn, đất phù sa tăng nhanh", "D": "địa hình thấp, lũ kéo dài trong năm, cần nước để nuôi trồng thủy sản, rửa mặn"}, "correct": "B"}, {"id": 54, "text": "Lũ ở vùng Đồng bằng sông Cửu Long tương đối điều hòa và kéo\ndài chủ yếu là do nguyên nhân nào sau đây?", "options": {"A": "Nhiều hồ đầm, địa hình thấp, phẳng, có nhiều cửa sông lớn đổ ra biển", "B": "Địa hình thấp, phẳng, diện tích lưu vực sông rộng, có nhiều cửa sông", "C": "Địa hình bằng phẳng, rộng lớn, hệ thống sông ngòi, kênh rạch dày đặc", "D": "Sông dài, có hồ lớn điều tiết nước, diện tích lưu vực và tổng nước lớn"}, "correct": "D"}]}, "ds": [{"id": 1, "context": "Đồng bằng sông Cửu Long là đồng bằng châu thổ lớn nhất nước ta, địa hình\nthấp, bằng phẳng, thuận lợi cho canh tác nông nghiệp và các hoạt động\nkinh tế khác. Vùng có ba loại đất chính: Đất phù sa sông có diện tích\nkhoảng hơn 1 triệu ha, phân bố dọc sông Tiền, sông Hậu, là loại đất tốt,\nmàu mỡ, thích hợp trồng lúa và các loại cây trồng khác. Đất phèn có hơn\n1,6 triệu ha, đất mặn có gần 1 triệu ha", "statements": [{"letter": "a", "text": "Loại đất chiếm diện tích lớn nhất ở Đồng bằng sông Cửu Long là đất mặn", "correct": false}, {"letter": "b", "text": "Diện tích đất phèn, đất mặn lớn gây khó khăn cho sản xuất nông nghiệp ở Đồng bằng sông Cửu Long", "correct": true}, {"letter": "c", "text": "Để đáp ứng nhu cầu sản xuất của ngành trồng trọt, giải pháp quan trọng nhất là cải tạo đất cho Đồng bằng sông Cửu Long", "correct": true}, {"letter": "d", "text": "Giải pháp quan trọng nhất để cải tạo đất ở Đồng bằng sông Cửu Long là sử dụng các loại phân bón thích hợp, bổ sung dinh dưỡng cho đất", "correct": false}]}, {"id": 2, "context": "Tính từ cuối năm 2015 đến nay, nhiều địa phương ở Đồng bằng sông Cửu\nLong đã bị nhiễm mặn, trong đó đã có 11/13 tỉnh/thành công bố tình trạng\nthiên tai hạn hán, xâm nhập mặn. Những thay đổi nguồn nước từ thượng\nnguồn sông Mê Kông hay những tác động khác như nhiệt độ tăng, nước biển\ndâng, lũ lụt, khô hạn, xâm nhập mặn và xói lở đất,\\...đã làm cho vùng\nnày đứng trước nhiều nguy cơ và thách thức. Dưới tác động đó, Đồng bằng\nsông Cửu Long ước tính hàng trăm nghìn ha đất khô hạn, sản lượng lương\nthực và năng suất cây trồng có nguy cơ giảm sút lớn, đe dọa tới an ninh\nlương thực của quốc gia", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long chịu tác động mạnh của biến đổi khí hậu", "correct": true}, {"letter": "b", "text": "Diện tích rừng ở Đồng bằng sông Cửu Long giảm nhanh do tình trạng nhiễm mặn", "correct": false}, {"letter": "c", "text": "Nước biển dâng cao là một trong những nguyên nhân làm cho Đồng bằng sông Cửu Long bị xâm nhập mặn sâu", "correct": true}, {"letter": "d", "text": "Giải pháp quan trọng để ứng phó nguy cơ hạn mặn, thiếu nước ở Đồng bằng sông Cửu Long là phát triển hệ thống thủy lợi, thay đổi cơ cấu sản xuất nông nghiệp", "correct": true}]}, {"id": 3, "context": "Đồng bằng sông Cửu Long là đồng bằng châu thổ lớn nhất nuớc ta, được bồi\ntụ phù sa bởi hệ thống sông Mê Công và phù sa biển. Vùng có quỹ đất lớn\nvới các nhóm đất chính: nhóm đất phù sa sông phân bố ven sông Tiền, sông\nHậu; nhóm đất phèn ở vùng Đồng Tháp Muời, vùng trũng Cà Mau,\\...; nhóm\nđất mặn ở vành đai ven biển", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long được bồi tụ bởi phù sa sông trên cơ sở có vịnh biển nông và thềm lục địa mở rộng", "correct": true}, {"letter": "b", "text": "Biện pháp hàng đầu để cải tạo đất ở Đồng bằng sông Cửu Long là sử dụng hợp lí nước ngọt", "correct": true}, {"letter": "c", "text": "Vấn đề nước ngọt đặc biệt quan trọng với Đồng bằng sông Cửu Long chủ yếu do vùng có một mùa khô sâu sắc kéo dài", "correct": true}, {"letter": "d", "text": "Đất nông nghiệp chiếm tỉ lệ cao ở Đồng bằng sông Cửu Long chủ yếu do đồng bằng rộng lớn, dân cư đông", "correct": false}]}, {"id": 4, "context": "Khí hậu của vùng Đồng bằng sông Cửu Long mang tính chất cận xích đạo.\nNhiệt độ trung bình trên 25°c, biên độ nhiệt độ trung bình năm nhỏ, số\ngiờ nắng cao; lượng mưa trung bình năm khoảng 1 500 - 2 000 mm. Khí hậu\nthuận lợi cho sản xuất nông nghiệp nhiệt đới, có tiềm năng phát triển\nđiện gió, điện mặt trời", "statements": [{"letter": "a", "text": "Khí hậu của Đồng bằng sông Cửu Long phân thành hai mùa mưa và khô rõ rệt", "correct": true}, {"letter": "b", "text": "Sản phẩm nông nghiệp của Đồng bằng sông Cửu Long chủ yếu là các loài nhiệt đới và cận xích đạo", "correct": true}, {"letter": "c", "text": "Có nhiều vùng trũng rộng lớn là nguyên nhân khiến Đồng bằng sông Cửu Long bị xâm nhập mặn gay gắt", "correct": false}, {"letter": "d", "text": "Vào mùa khô, tình trạng thiếu nước là nguyên nhân chủ yếu khiến sâu bệnh phát triển phá hoại mùa màng ở Đồng bằng sông Cửu Long", "correct": false}]}, {"id": 5, "context": "Khí hậu Đồng bằng sông Cửu Long có tính chất cận xích đạo, phân hoá theo\nmùa khô và mưa rõ rệt. Đây là điều kiện thuận lợi cho sự phát triển của\nnhiều ngành kinh tế, đặc biệt là sản xuất nông nghiệp và du lịch", "statements": [{"letter": "a", "text": "Khó khăn lớn nhất về tự nhiên của Đồng bằng sông Cửu Long là mùa khô kéo dài, gia tăng nhiễm mặn, nhiễm phèn", "correct": true}, {"letter": "b", "text": "Đồng bằng sông Cửu Long là một trong những vùng chịu ảnh hưởng sâu sắc nhất của biến đổi khí hậu toàn cầu", "correct": true}, {"letter": "c", "text": "Để ứng phó với biến đổi khí hậu, Đồng bằng sông Cửu Long cần tích cực luân canh, khai thác rừng ngập mặn", "correct": false}, {"letter": "d", "text": "Biến đổi khí hậu tác động tới Đồng bằng sông Cửu Long là xâm nhập mặn sâu, mùa khô kéo dài, sạt lở gia tăng", "correct": true}]}, {"id": 6, "context": "[Biểu đồ]\n\nDIỆN TÍCH LÚA MỘT SỐ VÙNG NƯỚC TA, NĂM 2017, 2020 VÀ 2021\n\n*(Số liệu theo Niên giám thống kê Việt Nam 2022,\nhttps://www.gso.gov.vn)", "statements": [{"letter": "a", "text": "Trung du và miền núi Bắc Bộ giảm nhiều hơn Đồng bằng sông Cửu Long", "correct": false}, {"letter": "b", "text": "Đồng bằng sông Cửu Long giảm chậm hơn Trung du và miền núi Bắc Bộ", "correct": false}, {"letter": "c", "text": "Đồng bằng sông Hồng giảm chậm hơn Đồng bằng sông Cửu Long", "correct": false}, {"letter": "d", "text": "Đồng bằng sông Cửu Long giảm nhiều hơn Đồng bằng sông Hồng", "correct": true}]}, {"id": 7, "context": "Đồng bằng sông Cửu Long có mạng lưới sông ngòi, kênh rạch dày đặc, hệ\nthống sông Cửu Long với 2 nhánh lớn là sông Tiền và sông Hậu. Sông ngòi\ncó vai trò quan trọng về thuỷ lợi, giao thông đường sông và phát triển\ndu lịch", "statements": [{"letter": "a", "text": "Bề mặt Đồng bằng sông Cửu Long có hệ thống sông ngòi, kênh rạch chằng chịt nên bị chia thành nhiều ô nhỏ", "correct": true}, {"letter": "b", "text": "Mạng lưới sông ngòi ở Đồng bằng sông Cửu Long còn có tiềm năng thủy điện lớn, cung cấp năng lượng cho vùng", "correct": false}, {"letter": "c", "text": "Nguồn nước ngọt có vai trò chủ yếu với Đồng bằng sông Cửu Long là thau chua, rửa mặn đất đai, phục vụ sinh hoạt", "correct": true}, {"letter": "d", "text": "Dọc theo các hệ thống sông của Đồng bằng sông Cửu Long hiện nay đang chịu ảnh hưởng nghiêm trọng của hiện tượng sạt lở", "correct": true}]}, {"id": 8, "context": "Đồng bằng sông Cửu Long là đồng bằng châu thổ xa nhất về phía Nam của\nViệt Nam có diện tích khoảng 40,9 nghìn km^2^. Có địa hình thấp, bằng\nphẳng; khí hậu mang tính chất cận xích đạo; mạng lưới sông ngòi, kênh\nrạch dày đặc. Với vùng biển rộng, nhiều đảo, nổi bật là đảo Phú Quốc", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là đồng bằng châu thổ lớn nhất nước ta", "correct": true}, {"letter": "b", "text": "Đồng bằng sông Cửu Long không thuận lợi để phát triển tổng hợp kinh tế biển", "correct": false}, {"letter": "c", "text": "Đặc điểm vị trí địa lí, khí hậu và địa hình của vùng Đồng bằng sông Cửu Long là nguyên nhân chủ yếu làm tăng diện tích đất phèn, đất mặn", "correct": true}, {"letter": "d", "text": "Biến đổi khí hậu làm gia tăng hậu quả của hạn hán và quá trình xâm nhập mặn ở Đồng bằng sông Cửu Long", "correct": true}]}, {"id": 9, "context": "Vùng Đồng bằng sông Cửu Long có mạng lưới sông ngòi, kênh rạch dày đặc,\ncó hai nhánh sông chính (sông Tiền và sông Hậu) của hệ thống sông Cửu\nLong với nguồn nước dồi dào, chế độ nước điều hoà là nguồn cung cấp nước\ncho sản xuất nông nghiệp, phát triển nuôi trồng thuỷ sản và hoạt động du\nlịch. Hơn nữa, địa hình thấp, cắt xẻ nhiều tạo nên nhiều vùng trũng rất\nthuận lợi cho phát triển nuôi trồng thuỷ sản", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng có diện tích nuôi thủy sản lớn nhất nước ta", "correct": true}, {"letter": "b", "text": "Đồng bằng sông Cửu Long nuôi thủy sản nước ngọt, nước lợ và cả thủy sản nước mặn", "correct": true}, {"letter": "c", "text": "Khó khăn đối với nuôi thủy sản nước ngọt của Đồng bằng sông Cửu Long hiện nay là tình trạng xâm nhập mặn lấn sâu", "correct": true}, {"letter": "d", "text": "Để khắc phục khó khăn về tự nhiên với nuôi thủy sản, Đồng bằng sông Cửu Long cần khai thác tối đa diện tích rừng ngập mặn để nuôi thủy sản", "correct": false}]}, {"id": 10, "context": "Đồng bằng sông Cửu Long có tài nguyên du lịch phong phú. Khách du lịch\nvà doanh thu du lịch có xu hướng tăng đều từ 2015 đến 2019, năm 2020,\n2021 giảm nhưng hiện nay đang dần phục hồi trở lại. Loại hình du lịch\nđặc trưng là du lịch sinh thái, sông nước, nghỉ dưỡng biển đảo và văn\nhóa lễ hội", "statements": [{"letter": "a", "text": "Loại hình du lịch đặc trưng của Đồng bằng sông Cửu Long là kiến trúc, nghệ thuật", "correct": false}, {"letter": "b", "text": "Số lượt khách du lịch của vùng Đồng bằng sông Cửu Long từ 2015 đến nay rất ổn định (Sai)  c) Lượng khách du lịch năm 2020, 2021 giảm là do ảnh hưởng của đại dịch Covid 19", "correct": true}, {"letter": "c", "text": "Lượng khách du lịch năm 2020, 2021 giảm là do ảnh hưởng của đại dịch Covid 19", "correct": true}, {"letter": "d", "text": "Yếu tố tạo bước đột phá trong phát triển du lịch vùng Đồng bằng sông Cửu Long là chính sách ưu đãi và thu hút đầu tư", "correct": true}]}, {"id": 11, "context": "Tài nguyên sinh vật ở Đồng bằng sông Cửu Long phong phú, có hơn 240\nnghìn ha rừng năm 2021, chủ yếu là hệ sinh thái rừng ngập mặn, rừng tràm\nở các vuờn quốc gia (U Minh Thuợng, U Minh Hạ,\\...), khu dụ trữ sinh\nquyển (Mũi Cà Mau, Kiên Giang,\\...) cùng động vật có giá trị, đặc biệt\nlà loài cá và loài chim", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long có diện tích rừng ngập mặn lớn nhất cả nước", "correct": true}, {"letter": "b", "text": "Rừng ngập mặn có giá trị chủ yếu về kinh tế, cung cấp nhiều lâm sản có giá trị cao", "correct": false}, {"letter": "c", "text": "Diện tích rừng ngập mặn ở Đồng bằng sông Cửu Long gần đây có xu hướng giảm do chuyển đổi sản xuất, biến đổi khí hậu", "correct": true}, {"letter": "d", "text": "Việc bảo vệ và mở rộng rừng ngập mặn ở Đồng bằng sông Cửu Long có ý nghĩa quan trọng trong việc bảo vệ môi trường sinh thái, hạn chế thiên tai", "correct": true}]}, {"id": 12, "context": "Diện tích nuôi trồng và sản lượng thủy sản ở Đồng bằng sông Cửu Long,\ngiai đoạn 2010 - 2021\n\n  \n  Năm                          2010   2015   2020   2021\n      \n  Diện tích nuôi trồng thuỷ sản    742,7      757        801,3      811,6\n  *(nghìn ha)*                                                      \n\n  Tổng sản lượng thuỷ sản *(nghìn  2999,1     3703,4     4834,2     4918,6\n  tấn)*                                                             \n\n  \\- Nuôi trồng                    1986,6     2471,3     3320,8     3410,5\n\n  \\- Đánh bắt                      1012,5     1232,1     1513,4     1508,1\n  \n\n*(Nguồn: Tổng cục Thống kê năm 2021, 2022)", "statements": [{"letter": "a", "text": "Diện tích nuôi trồng thuỷ sản tăng liên tục qua các năm", "correct": true}, {"letter": "b", "text": "Sản lượng thuỷ sản đánh bắt tăng liên tục qua các năm", "correct": false}, {"letter": "c", "text": "Biểu đồ kết hợp là dạng biểu đồ thích hợp nhất để thể hiện quy mô diện tích nuôi trồng và sản lượng thủy sản ở Đồng bằng sông Cửu Long, giai đoạn 2010 - 2021", "correct": true}, {"letter": "d", "text": "Sản lượng thuỷ sản khai thác tăng nhanh hơn sản lượng thuỷ sản nuôi trồng", "correct": false}]}, {"id": 13, "context": "Khoáng sản ở Đồng bằng sông Cửu Long có dầu mỏ và khí tự nhiên ở vùng\nthềm lục địa; vật liệu xây dựng có đá vôi ở khu vực Hà Tiên (Kiên\nGiang), đá xây dựng ở vùng Bảy Núi (An Giang); sét, cao lanh,\\... Ngoài\nra, còn có than bùn ở các khu vực đầm lầy, dưới rừng ngập nước (Kiên\nGiang, Cà Mau,\\...)", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng có trữ lượng than nâu lớn nhất cả nước", "correct": false}, {"letter": "b", "text": "Tài nguyên khoáng sản thuận lợi cho Đồng bằng sông Cửu Long phát triển một số ngành công nghiệp khai thác và chế biến", "correct": true}, {"letter": "c", "text": "Ngành sản xuất vật liệu xây dựng phát triển ở Đồng bằng sông Cửu Long chủ yếu do có nguồn nguyên liệu phong phú", "correct": true}, {"letter": "d", "text": "Khó khăn chủ yếu với việc khai thác khoáng sản ở Đồng bằng sông Cửu Long là thiếu vốn, trình độ khoa học kĩ thuật hạn chế", "correct": false}]}, {"id": 14, "context": "Đồng bằng sông Cửu Long có vùng biển rộng lớn, có ngư trường Cà Mau -\nKiên Giang với nhiều bãi cá, bãi tôm lớn; vùng biển có nhiều đảo, quần\nđảo và một số bãi tắm, điều này tạo thế mạnh cho vùng phát triển nhiều\nngành kinh tế biển", "statements": [{"letter": "a", "text": "Phú Quốc là trung tâm du lịch thuộc vùng Đồng bằng sông Cửu Long", "correct": true}, {"letter": "b", "text": "Đồng bằng sông Cửu Long phát triển khai thác thủy sản chủ yếu do tài nguyên sinh vật phong phú, có ngư trường lớn", "correct": true}, {"letter": "c", "text": "Đường bờ biển dài, nhiều cửa sông với hàm lượng phù sa cao là điều kiện thuận lợi cho Đồng bằng sông Cửu Long phát triển du lịch biển đảo", "correct": false}, {"letter": "d", "text": "Việc phát triển tổng hợp các ngành kinh tế biển có ý nghĩa chủ yếu là khai thác thế mạnh, tạo thế liên hoàn, thúc đẩy tăng trưởng kinh tế", "correct": true}]}, {"id": 15, "context": "Tự nhiên của Đồng bằng sông Cửu Long là một hình ảnh của sự đa dạng và\ngiàu sức sống, với diện tích đất phù sa sông chiếm 30% diện tích, đất\nphèn chiếm 40% diện tích, đất mặn chiếm 19% diện tích, thuộc kiểu khí\nhậu cận xích đạo gió mùa, phân hoá thành mùa mưa và mùa khô rõ rệt, đôi\nkhi gặp phải hạn hán, xâm nhập mặn, đối mặt với tình trạng biến đổi khí\nhậu và ô nhiễm môi trường từ hoạt động của con người", "statements": [{"letter": "a", "text": "Phần lớn diện tích là đất phèn, đất mặn, có một mùa khô sâu sắc", "correct": true}, {"letter": "b", "text": "Tình trạng xâm nhập mặn lấn sâu, sụt lún vùng ngọt, thiếu nước sinh hoạt và sản xuất", "correct": true}, {"letter": "c", "text": "Biện pháp chủ yếu để ứng phó với hạn mặn là phát triển nuôi thủy sản, tăng diện tích lúa", "correct": false}, {"letter": "d", "text": "Biện pháp chủ yếu ứng phó với biến đổi khí hậu là chuyển đổi cơ cấu kinh tế, cơ cấu mùa vụ", "correct": true}]}, {"id": 16, "context": "Đồng bằng sông Cửu Long được thiên nhiên ưu đãi với nhiều tiềm năng, thế\nmạnh cho phát triển kinh tế. Tuy nhiên, vùng cũng phải đối mặt với không\nít hạn chế như mùa khô kéo dài, thiếu nước ngọt, xâm nhập mặn, triều\ncường và những thách thức lớn trước tác động của biến đổi khí hậu. Vì\nvậy, việc sử dụng hợp lí tự nhiên ở Đồng bằng sông Cửu Long đòi hỏi phải\nđi đôi với cải tạo", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long có mùa khô kéo dài do ảnh hưởng của gió mùa đông bắc", "correct": false}, {"letter": "b", "text": "Việc sử dụng hợp lí và cải tạo tự nhiên ở Đồng bằng sông Cửu Long nhằm khai thác hiệu quả thế mạnh, nâng vị thế vùng", "correct": true}, {"letter": "c", "text": "Giải pháp chủ yếu để cải tạo và sử dung hợp lí tự nhiên ở Đồng bằng sông Cửu Long là phát triển kinh tế gắn với cải tạo tự nhiên, thích ứng biến đổi khí hậu", "correct": true}, {"letter": "d", "text": "Ý nghĩa chủ yếu của việc cải tạo và sử dụng hợp lí tự nhiên ở Đồng bằng sông Cửu Long là tăng trưởng kinh tế, phát triển bền vững", "correct": true}]}, {"id": 17, "context": "Nông nghiệp vùng Đồng bằng sông Cửu Long được phát triển theo hướng sinh\nthái bền vững với các sản phẩm trọng tâm là thuỷ sản, lúa gạo và trái\ncây; phát triển nông nghiệp ứng dụng công nghệ cao, nông nghiệp xanh và\nhữu cơ", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng trọng điểm lớn nhất cả nước về lương thực và thủy sản", "correct": true}, {"letter": "b", "text": "Giải pháp chủ yếu trong nông nghiệp để ứng phó với biến đổi khí hậu ở đồng bằng sông Cửu Long là chuyển đổi cơ cấu sản xuất, bố trí mùa vụ hợp lí", "correct": true}, {"letter": "c", "text": "Việc chuyển đổi cơ cấu cây trồng ở Đồng bằng sông Cửu Long góp phần thích ứng với tình trạng hạn hán, xâm nhập mặn, thiếu nước ngọt", "correct": true}, {"letter": "d", "text": "Ý nghĩa chủ yếu của việc phát triển nông nghiệp công nghệ cao, nông nghiệp hữu cơ ở Đồng bằng sông Cửu Long là giải quyết việc làm cho lao động", "correct": false}]}, {"id": 18, "context": "Đồng bằng sông Cửu Long là vùng sản xuất thuỷ sản lớn nhất nước ta cả về\ngiá trị sản xuất, diện tích mặt nước nuôi trồng và sản lượng thuỷ sản.\nGiá trị sản xuất thuỷ sản chiếm trên 50 % giá trị sản xuất thuỷ sản cả\nnước năm 2021", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long có sản lượng thủy sản khai thác lớn hơn nuôi trồng", "correct": false}, {"letter": "b", "text": "Hoạt động đánh bắt thủy sản ở Đồng bằng sông Cửu Long thuận lợi hơn Đồng bằng sông Hồng do có nguồn thủy sản phong phú", "correct": true}, {"letter": "c", "text": "Nuôi trồng thủy sản ở Đồng bằng sông Cửu Long hiện nay phát triển theo hướng tập trung do chuyển đổi cơ cấu nông nghiệp, nhu cầu lớn của thị trường", "correct": true}, {"letter": "d", "text": "Việc mở rộng diện tích nuôi tôm ở Đồng bằng sông Cửu Long cần gắn với việc chuyển đổi diện tích rừng ngập mặn", "correct": false}]}, {"id": 19, "context": "Diện tích mặt nước nuôi trồng thuỷ sản ở Đồng bằng sông Cửu Long lớn,\nchiếm gần 72 % cả nước năm 2021, sản lượng nuôi trồng thuỷ sản tăng\nnhanh với các loại thuỷ sản da dạng như: cá da trơn, chình, cá lóc, tôm\nsú, tôm thẻ chân trắng, sò huyết, nghêu,\\", "statements": [{"letter": "a", "text": "Sản phẩm thủy sản nuôi trồng chủ yếu nhất ở Đồng bằng sông Cửu Long là tôm", "correct": true}, {"letter": "b", "text": "Việc phát triển nuôi trồng thủy sản gặp khó khăn chủ yếu là dịch bệnh và biến động của thị trường", "correct": true}, {"letter": "c", "text": "Giải pháp nâng cao sản lượng thủy sản nuôi trồng ở Đồng bằng sông Cửu Long là thâm canh, ứng dụng công nghệ cao vào nuôi trồng", "correct": true}, {"letter": "d", "text": "Sản lượng tôm nuôi hiện nay ở Đồng bằng sông Cửu Long tăng mạnh chủ yếu do tăng cường lao động", "correct": false}]}, {"id": 20, "context": "Sản xuất lương thực là ngành giữ vai trò quan trọng nhất trong nông\nnghiệp của vùng Đồng bằng sông Hồng. Năm 2021, vùng chiếm khoảng 50% cả\nvề diện tích gieo trồng và sản lượng lương thực có hạt của cả nước. Bình\nquân lương thực đầu người của vùng đạt 405,1 kg, gấp hơn 2,8 lần mức\nbình quân của cả nước", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng có năng suất lúa cao bậc nhất cả nước", "correct": true}, {"letter": "b", "text": "Hiện nay Đồng bằng sông Cửu Long đã sản xuất được nhiều giống gạo có chất lượng tốt để xuất khẩu", "correct": true}, {"letter": "c", "text": "Xây dựng thương hiệu nông sản ở Đồng bằng sông Cửu Long có ý nghĩa chủ yếu là nâng cao giá trị sản phẩm, đẩy mạnh xuất khẩu", "correct": true}, {"letter": "d", "text": "Giải pháp quan trọng nhất để tăng sản lượng lương thực ở Đồng bằng sông Cửu Long là khai hoang vùng rừng ngập mặn, đẩy mạnh thâm canh ở vùng đất phèn", "correct": false}]}, {"id": 21, "context": "Sản lượng thủy sản của vùng Đồng bằng sông Cửu Long giai đoạn 2010 -\n2021\n\n*(Đơn vị: nghìn tấn)*\n\n  \n  Năm                    2010    2015    2020    2021\n      \n  Khai thác                  1012,5      1232,1      1513,4      1508,1\n\n  Nuôi trồng                 1986,6      2471,3      3320,8      3410,5\n  \n\n*(Nguồn: Niên giám Thống kê năm 2011, 2016, 2022)", "statements": [{"letter": "a", "text": "Sản lượng thủy sản khai thác cao hơn sản lượng thủy sản nuôi trồng", "correct": false}, {"letter": "b", "text": "Tổng sản lượng thủy sản của vùng Đồng bằng sông Cửu Long tăng", "correct": true}, {"letter": "c", "text": "Hoạt động nuôi trồng thủy sản ngày càng có vai trò quan trọng trong ngành thủy sản ở Đồng bằng sông Cửu Long", "correct": true}, {"letter": "d", "text": "Biểu đồ miền là dạng biểu đồ thích hợp nhất để thể hiện cơ cấu sản lượng thủy sản của vùng Đồng bằng sông Cửu Long, giai đoạn 2010 - 2021", "correct": true}]}, {"id": 22, "context": "Đồng bằng sông Cửu Long còn đứng đầu cả nước về trồng rau các loại, chăn\nnuôi gia cầm, đáng chú ý đây là vùng nuôi vịt hàng hoá lớn nhất cả nước.\nChăn nuôi gia súc nổi bật là lợn và bò. Đàn lợn và đàn bò tăng với tốc\nđộ khá nhanh để đáp ứng nhu cầu thực phẩm cho thị trường trong vùng và\nThành phố Hồ Chí Minh", "statements": [{"letter": "a", "text": "Cơ cấu sản phẩm nông nghiệp ở Đồng bằng sông Cửu Long đa dạng, phong phú", "correct": true}, {"letter": "b", "text": "Đồng bằng sông Cửu Long có đàn vịt lớn nhất cả nước chủ yếu do diện tích chăn thả lớn, thị trường rộng", "correct": true}, {"letter": "c", "text": "Đồng bằng sông Cửu Long hiện nay chú trọng phát triển các vùng chuyên môn hóa sản xuất rau các loại nhằm thúc đẩy sản xuất hàng hóa, đáp ứng thị trường", "correct": true}, {"letter": "d", "text": "Giải pháp chủ yếu nhằm nâng cao năng suất và chất lượng cây ăn quả ở Đồng bằng sông Cửu Long là thu hút đầu tư, thay đổi cơ cấu cây trồng", "correct": false}]}, {"id": 23, "context": "Tình hình sử dụng đất của Đồng bằng sông Hồng và Đồng bằng sông Cửu\nLong, năm 2022\n\n*(Đơn vị: nghìn ha)*\n\n  \n  Các loại đất         Đồng bằng sông       Đồng bằng sông Cửu\n                           Hồng                 Long\n    \n  Tổng diện tích đất       2106,0                 4057,6\n\n  Đất nông nghiệp          869,3                  2607,1\n\n  Đất lâm nghiệp           519,8                  302,1\n\n  Đất chuyên dùng          318,4                  262,7\n\n  Đất ở                    141,0                  124,3\n\n  Đất chưa sử dụng         357,5                  761,4\n  \n\n*(Nguồn: Niên giám thống kê Việt Nam 2022, NXB Thống kê, 2023)", "statements": [{"letter": "a", "text": "Diện tích đất nông nghiệp của Đồng bằng sông Cửu Long lớn gấp 3,5 lần Đồng bằng sông Hồng", "correct": false}, {"letter": "b", "text": "Diện tích đất chuyên dùng của Đồng bằng sông Hồng lớn gấp hơn 1,2 lần Đồng bằng sông Cửu Long", "correct": true}, {"letter": "c", "text": "Diện tích đất lâm nghiệp của Đồng bằng sông Hồng lớn gấp hơn 1,7 lần Đồng bằng sông Cửu Long", "correct": true}, {"letter": "d", "text": "Biểu đồ cột là dạng biểu đồ thích hợp nhất để so sánh diện tích sử dụng đất của Đồng bằng sông Hồng và Đồng bằng sông Cửu Long, năm 2022", "correct": true}]}, {"id": 24, "context": "Lúa là cây lương thực chủ đạo, chiếm hơn 99% về diện tích và sản lượng\nlương thực có hạt của vùng Đổng bằng sông Cửu Long. Đây cũng là vùng sản\nxuất lúa hàng hoá lớn nhất và chiếm hơn 90% sản lượng gạo xuất khẩu của\ncả nước", "statements": [{"letter": "a", "text": "Thế mạnh của Đổng bằng sông Cửu Long trong sản xuất lương thực là khí hậu, đất đai, thị trường tiêu thụ", "correct": true}, {"letter": "b", "text": "Định hướng chủ yếu trong sản xuất lương thực của Đổng bằng sông Cửu Long là thâm canh, tăng vụ kết hợp với cải tạo đất", "correct": true}, {"letter": "c", "text": "Đổng bằng sông Cửu Long hiện nay chú trọng gia tăng sản lượng lương thực nhằm phát huy thế mạnh, tăng hiệu quả kinh tế", "correct": true}, {"letter": "d", "text": "Giải pháp chủ yếu nhằm nâng cao sản lượng lúa ở Đồng bằng sông Cửu Long là sử dụng giống lúa chất lượng cao, đẩy mạnh xuất khẩu", "correct": false}]}, {"id": 25, "context": "Đồng bằng sông Cửu Long là vùng trọng điểm sản xuất lương thực, thực\nphẩm lớn nhất cả nước, có vai trò đặc biệt quan trọng trong chiến lược\nphát triển kinh tế xã hội của đất nước", "statements": [{"letter": "a", "text": "Vùng dẫn đầu cả nước về diện tích, chiếm hơn 50% sản lượng và sản lượng xuất khẩu lương thực", "correct": true}, {"letter": "b", "text": "Vùng có mật độ dân đông số nhất cả nước nên nhu cầu về lương thực, thực phẩm rất lớn", "correct": false}, {"letter": "c", "text": "Áp dụng công nghệ sinh học, công nghệ môi trường để phát triển các mô hình kinh tế trên từng địa bàn, tham gia vào các chuỗi giá trị toàn cầu", "correct": true}, {"letter": "d", "text": "Đồng bằng sông Cửu Long là vùng ít chịu ảnh hưởng của biến đổi khí hậu, thiên tai, khí hậu ôn hòa mát mẻ", "correct": false}]}, {"id": 26, "context": "Đồng bằng sông Cửu Long có nhiều lợi thế về tự nhiên để phát triển du\nlịch. Hệ thống sông, kênh rạch chằng chịt, các cù lao sông; các hệ sinh\nthái rừng như rừng ngập mặn (U Minh Thượng, U Minh Hạ - Cà Mau), rừng\ntràm (Vườn quốc gia Tràm Chim - Đổng Tháp),\\... tạo nên cảnh quan thiên\nnhiên độc đáo, hấp dẫn khách du lịch", "statements": [{"letter": "a", "text": "Chợ nổi trên sông là một loại hình hoạt động đặc sắc của vùng Đồng bằng sông Cửu Long thu hút du khách", "correct": true}, {"letter": "b", "text": "Phát triển du lịch biển đảo ở Đồng bằng sông Cửu Long đang có sức hấp dẫn lớn với du khách cả trong và ngoài nước", "correct": true}, {"letter": "c", "text": "Ngoài các tài nguyên du lịch tự nhiên, Đồng bằng sông Cửu Long có nhiều tiềm năng phát triển du lịch nhân văn", "correct": true}, {"letter": "d", "text": "Ý nghĩa chủ yếu của việc phát triển du lịch ở Đồng bằng sông Cửu Long là chuyển dịch cơ cấu kinh tế, phát triển đồng đều các địa phương", "correct": false}]}, {"id": 27, "context": "Sản xuất lương thực là ngành giữ vai trò quan trọng nhất trong sản xuất\nnông nghiệp của vùng Đồng bằng sông Cửu Long. Trong những năm qua, sản\nxuất lương thực của vùng đã có nhiều chuyển biến tích cực, năng suất và\nsản lượng không ngừng tăng", "statements": [{"letter": "a", "text": "Vùng có năng suất lúa cao nhờ việc ứng dụng khoa học - công nghệ trong sản xuất", "correct": true}, {"letter": "b", "text": "Lúa là cây lương thực chủ đạo, chiếm tỉ trọng cao về diện tích gieo trồng và sản lượng lương thực có hạt của vùng", "correct": true}, {"letter": "c", "text": "Giải pháp quan trọng nhất để phát triển trồng lúa hàng hóa ở Đồng bằng sông Cửu Long là đẩy mạnh thâm canh, tăng cường chế biến và xuất khẩu", "correct": true}, {"letter": "d", "text": "Vùng là vựa lúa lớn nhất nước ta, diện tích gieo trồng và sản lượng lúa luôn chiếm tỉ trọng cao trong cả nước", "correct": true}]}, {"id": 28, "context": "Tập trung phát triển nông nghiệp hàng hóa, hiện đại, quy mô lớn gắn với\ncông nghiệp chế biến và xây dựng thương hiệu sản phẩm; chuyển đổi cơ cấu\nsản phẩm chủ lực theo hướng giảm lúa gạo, tăng trái cây, thủy sản; sử\ndụng đất nông nghiệp linh hoạt, hiệu quả. Xây dụng trung tâm khởi nghiệp\nsáng tạo quốc gia về nông nghiệp trên địa bàn vùng", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng sản xuất cây ăn quả lớn nhất cả nước", "correct": true}, {"letter": "b", "text": "Chuyển dịch cơ cấu cây trồng, cơ cấu mùa vụ giúp Đồng bằng sông Cửu Long thích ứng với tự nhiên, mang lại hiệu quả cao", "correct": true}, {"letter": "c", "text": "Mục đích chủ yếu của việc chuyển đổi cơ cấu cây trồng ở Đồng bằng sông Cửu Long là tăng sản phẩm hàng hóa, giải quyết việc làm cho lao động", "correct": false}, {"letter": "d", "text": "Giải pháp quan trọng nhất để tăng năng suất ngành trồng trọt ở Đồng bằng sông Cửu Long là đẩy mạnh thâm canh", "correct": true}]}, {"id": 29, "context": "Diện tích nuôi trồng và sản lượng thuỷ sản của vùng Đồng bằng sông Cửu\nLong,\n\ngiai đoạn 2010 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n++++++\n| Năm            | 2010  | 2015  | 2020  | 2021  |\n|                    |           |           |           |           |\n| Tiêu chí       |           |           |           |           |\n++++++\n| Tổng sản lượng   | *         | *         | *         | *         |\n| thuỷ sản         | *2999,1 | *3703,4 | *4834,2 | *4918,6 |\n++++++\n| \\- Sản lượng nuôi  | 1986,6    | 2471,3    | 3320,8    | 3410,5    |\n| trồng              |           |           |           |           |\n++++++\n| \\- Sản lượng đánh  | 1012,5    | 1232,1    | 1513,4    | 1508,1    |\n| bắt                |           |           |           |           |\n++++++", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long là vùng trọng điểm sản xuất thủy sản lớn nhất nước ta", "correct": true}, {"letter": "b", "text": "Biểu đồ đường là dạng biểu đồ thích hợp nhất để thể hiện tốc độ tăng trưởng sản lượng thủy sản nuôi trồng và đánh bắt của vùng Đồng bằng sông Cửu Long, giai đoạn 2010 - 2021", "correct": true}, {"letter": "c", "text": "Tỉ trọng sản lượng thủy sản đánh bắt có xu hướng tăng trong cơ cấu giá trị sản lượng thủy sản", "correct": false}, {"letter": "d", "text": "Sản lượng nuôi trồng luôn cao hơn đánh bắt do nuôi trồng có nhiều thuận lợi để phát triển", "correct": true}]}, {"id": 30, "context": "Phát triển nông nghiệp xanh, năng lượng tái tạo; chú trọng phát triển\ncông nghiệp chế biến nông, thủy sản, công nghiệp phục vụ nông nghiệp,\ncông nghiệp hỗ trợ. Đồng bằng sông Cửu Long trở thành thương hiệu quốc\ntế về du lịch nông nghiệp, nông thôn, du lịch sinh thái và du lịch biển", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long hiện nay đang đẩy mạnh phát triển nguồn năng lượng gió và Mặt Trời", "correct": true}, {"letter": "b", "text": "Phát triển công nghiệp chế biến nông, thủy sản góp phần nâng cao giá trị nông sản, tạo hàng hóa, đáp ứng thị trường", "correct": true}, {"letter": "c", "text": "Các ngành công nghiệp chế biến phát triển mạnh ở Đồng bằng sông Cửu Long chủ yếu do có nguồn nguyên liệu dồi dào từ tự nhiên", "correct": false}, {"letter": "d", "text": "Phát triển công nghiệp và dịch vụ ở Đồng bằng sông Cửu Long nhằm thích ứng với sự biến đổi khí hậu toàn cầu, khai thác lợi thế về đất đai", "correct": false}]}, {"id": 31, "context": "Sản lượng gỗ khai thác một số vùng của nước ta giai đoạn 2018 - 2021\n\n*(Đơn vị: Nghìn m^3^)*\n\n  \n  Năm                          2018    2019   2020   2021\n      \n  Trung du và miền núi Bắc Bộ      4087,8      4315,1     4419,3     4847,9\n\n  Tây Nguyên                       685,7       699,3      712,0      753,7\n\n  Đồng bằng sông Cửu Long          800,5       801,8      805,9      797,3\n  \n\n*(Nguồn: Niên giám thống kê Việt Nam 2021, NXB Thống kê, 2022)", "statements": [{"letter": "a", "text": "Sản lượng gỗ khai thác ở Đồng bằng sông Cửu Long tăng liên tục", "correct": false}, {"letter": "b", "text": "Sản lượng gỗ khai thác ở Đồng bằng sông Cửu Long luôn lớn nhất", "correct": false}, {"letter": "c", "text": "Tốc độ tăng trưởng sản lượng gỗ khai thác ở Đồng bằng sông Cửu Long thấp nhất", "correct": true}, {"letter": "d", "text": "Biểu đồ tròn là dạng biểu đồ thích hợp nhất để so sánh quy mô sản lượng gỗ khai thác một số vùng của nước ta, giai đoạn 2018 - 2021", "correct": false}]}, {"id": 32, "context": "Đồng bằng sông Cửu Long cần chủ động thích ứng với biến đổi khí hậu và\nnước biển dâng; xây dựng các hồ chứa nước và nghiên cứu các biện pháp,\ncông trình trữ nước trong sông, kênh, rạch; phòng chống sạt lở, xâm nhập\nmặn; bảo vệ hệ sinh thái rừng ngập mặn", "statements": [{"letter": "a", "text": "Diện tích đất phèn, đất mặn của Đồng bằng sông Cửu Long ngày càng mở rộng", "correct": true}, {"letter": "b", "text": "Tình trạng hạn mặn diễn ra sâu sắc ở Đồng bằng sông Cửu Long chủ yếu do lưu lượng nước sông giảm, biến đổi khí hậu", "correct": true}, {"letter": "c", "text": "Hiện tượng sạt lở diễn ra ngày càng nghiêm trọng ở Đồng bằng sông Cửu Long chủ yếu do lưu lượng nước sông thay đổi, mùa khô kéo dài", "correct": false}, {"letter": "d", "text": "Để phát triển kinh tế bền vững, Đồng bằng sông Cửu Long cần tập trung khai thác hiệu quả vùng rừng ngập mặn", "correct": false}]}, {"id": 33, "context": "Đồng bằng sông Cửu Long là đồng bằng châu thổ rộng lớn nhất nước ta,\nđược bồi tụ phù sa bởi hệ thống sông Mê Công và phù sa biển. Vùng có quỹ\nđất lớn với các nhóm đất chính: nhóm đất phù sa sông phân bố ven sông\nTiền, sông Hậu; nhóm đất phèn ở vùng Đồng Tháp Mười, vùng trũng Cà\nMau,...; nhóm đất mặn ở ven biển", "statements": [{"letter": "a", "text": "Đồng bằng sông Cửu Long có diện tích tự nhiên nhỏ hơn Đồng bằng sông Hồng", "correct": false}, {"letter": "b", "text": "Điều kiện địa hình và đất đai đã tạo thuận lợi cho sản xuất lương thực quy mô lớn", "correct": true}, {"letter": "c", "text": "Vùng Đồng Tháp Mười nhóm đất phèn chiếm diện tích lớn do địa hình trũng thấp", "correct": true}, {"letter": "d", "text": "Vào mùa khô gia tăng xâm nhập mặn vào đất liền chủ yếu do địa hình thấp, ba mặt giáp biển", "correct": true}]}, {"id": 34, "context": "Diện tích và sản lượng lương thực có hạt của một số tỉnh ở Đồng bằng\nsông Cửu Long,\n\nnăm 2022\n\n  \n  Tỉnh                        Long   Đồng     An      Kiên\n                                  An     Tháp     Giang   Giang\n      \n  Diện tích lương thực có hạt     509,4    486,1      610,5     700,1\n  *(Nghìn ha)*                                                  \n\n  Sản lượng lương thực có hạt     2861,1   3234,9     3943,8    4405,4\n  *(Nghìn tấn)*                                                 \n  \n\n*(Nguồn: Niên giám Thống kê Việt Nam 2022, NXB Thống kê, 2023)", "statements": [{"letter": "a", "text": "Kiên Giang có diện tích và sản lượng lương thực có hạt cao nhất trong các tỉnh trên", "correct": true}, {"letter": "b", "text": "Năng suất lương thực có hạt của Long An thấp hơn Đồng Tháp, cao hơn An Giang", "correct": false}, {"letter": "c", "text": "Đồng Tháp có diện tích lương thực có hạt thấp nhưng năng suất cao nhất", "correct": true}, {"letter": "d", "text": "Do áp dụng khoa học kĩ thuật vào sản xuất nên các tỉnh đều đạt được sản lượng lương thực cao", "correct": true}]}, {"id": 35, "context": "Diện tích và sản lượng lúa ở vùng Đồng bằng sông Cửu Long giai đoạn\n2010 - 2021\n\n  \n  Năm                      2010   2015   2020   2021\n      \n  Diện tích *(Nghìn ha)*       3 945,9    4 301,5    3 963,7    3 898,6\n\n  Sản lượng *(Triệu tấn)*      21,6       25,6       23,8       24,3\n  \n\n*(Nguồn : Niên giám thống kê Việt Nam năm 2016, năm 2022)", "statements": [{"letter": "a", "text": "Diện tích và sản lượng lúa của Đồng bằng sông Cửu Long tăng liên tục qua các năm", "correct": false}, {"letter": "b", "text": "Diện tích lúa có tốc độ tăng trưởng chậm hơn so với tốc độ tăng trưởng của sản lượng", "correct": true}, {"letter": "c", "text": "Năng suất lúa của Đồng bằng sông Cửu Long tăng liên tục qua các năm", "correct": true}, {"letter": "d", "text": "Biểu đồ kết hợp là dạng biểu đồ thích hợp nhất để thể hiện diện tích và sản lượng lúa ở vùng Đồng bằng sông Cửu Long giai đoạn 2010 - 2021", "correct": true}]}], "tln": [{"id": 1, "question": "Tính năng suất gieo trồng lúa cả năm ở Đồng bằng sông Cửu\nLong năm 2022, biết diện tích lúa cả năm ở vùng này là 3 802,6 nghìn ha\nvà sản lượng lúa là 23 536,3 nghìn tấn. *(làm tròn kết quả đến số thập\nphân thứ nhất của tạ/ha)", "answer": "23536,3 : 3802,6 = 6,189528 tấn/ha ≈ 61,9 tạ/ha", "explanation": "Đáp án: 23536,3 : 3802,6 = 6,189528 tấn/ha ≈ 61,9 tạ/ha"}, {"id": 2, "question": "Năm 2021, đồng bằng sông Cửu Long có diện tích trồng lúa là\n3,9 triệu ha, năng suất lúa đạt 62,3 tạ/ha. Hỏi sản lượng lúa của đồng\nbằng là bao nhiêu triệu tấn? *(làm tròn đến số thập phân thứ nhất của\ntriệu tấn)", "answer": "62,3 x 3,9 = 242,97 triệu tạ ≈ 24,3 triệu tấn", "explanation": "Đáp án: 62,3 x 3,9 = 242,97 triệu tạ ≈ 24,3 triệu tấn"}, {"id": 3, "question": "Năm 2021 dân số của Đồng bằng sông Cửu Long là 17,4 triệu\nngười, tỉ lệ dân thành thị là 26,4%. Tính số dân nông thôn của Đồng bằng\nsông Cửu Long năm 2021. *(làm tròn kết quả đến số thập phân thứ nhất của\ntriệu người)", "answer": "17,4 - 4,5936 ≈ 12,8", "explanation": "\\- Số dân thành thị của Đồng bằng sông Cửu Long năm 2021 là: (26,4 x\n17,4) : 100 = 4,5936 triệu người.\n\nĐáp án: 17,4 - 4,5936 ≈ 12,8"}, {"id": 4, "question": "Năm 2021, diện tích lúa của cả nước là 7238,9 nghìn ha, của\nĐồng bằng Sông Cửu Long là 3898,6 nghìn ha. Tính tỉ trọng diện tích lúa\ncủa Đồng bằng sống Cửu Long so với cả nước. *(làm tròn đến số thập phân\nthứ nhất của %)", "answer": "(3898,6 : 7238,9) x 100 ≈ 53,9", "explanation": "Đáp án: (3898,6 : 7238,9) x 100 ≈ 53,9"}, {"id": 5, "question": "Cho bảng số liệu:\n\nSản lượng thủy sản khai thác và số lượng tàu, thuyền khai thác thủy\nsản\n\ncủa cả nước và một số vùng, năm 2022\n\n  ------------------------------------------------------------------------\n  Vùng                Cả nước Đông Nam   Đồng bằng sông Cửu\n                                      Bộ         Long\n  ----------------------- ----------- ------------ -----------------------\n  Sản lượng thủy sản khai 3874,2      359,0        1416,4\n  thác *(nghìn tấn)*                               \n\n  Số lượng tàu, thuyền    93122       5374         21318\n  khai thác thủy sản                               \n  *(chiếc)*                                        \n  ------------------------------------------------------------------------\n\n*(Nguồn:Niên giám thống kê Việt Nam 2022, NXB Thống kê,2023)*\n\nCho biết số lượng tàu, thuyền của Đồng bằng sông Cửu Long năm 2022 gấp\nbao nhiêu lần Đông Nam Bộ? *(làm tròn kết quả đến hàng đơn vị)", "answer": "21318 : 5374 ≈ 4", "explanation": "Đáp án: 21318 : 5374 ≈ 4"}, {"id": 6, "question": "Năm 2021 dân số của Đồng bằng sông Cửu Long là 17,4 triệu\nngười, tỉ lệ dân thành thị là 26,4%. Tính tỉ lệ dân nông thôn của Đồng\nbằng sông Cửu Long năm 2021. *(làm tròn kết quả đến số thập phân thứ\nnhất của %)", "answer": "100 - 26,4 = 73,6", "explanation": "Đáp án: 100 - 26,4 = 73,6"}, {"id": 7, "question": "Cho bảng số liệu:\n\nSố dân và sản lượng lương thực có hạt của vùng Đồng bằng sông Cửu\nLong\n\n  ------------------------------------------------------------------------\n  Năm                                     2012      2022\n  ------------------------------------------- ------------- --------------\n  Số dân *(nghìn người)*                      17398,7       17432,1\n\n  Sản lượng lương thực có hạt *(triệu tấn)*   24,5          23,7\n  ------------------------------------------------------------------------\n\n*(Nguồn: Tổng cục Thống kê năm 2021, 2022)*\n\nBình quân lương thực c let topic = 'bai22', type = 'mcq', level = 'all';
const answered = {};   // qid -> {done, correct, selected?, stmts?, score?}
const dsSel   = {};    // qid -> {letter -> bool}  (DS live before submit)

const KEYS = ['bai22','bai23','bai24','bai25'];
const ICONS = {bai22:'🏖️',bai23:'🌿',bai24:'🏙️',bai25:'🌾'};
const SHORT = {bai22:'Duyên hải NTB',bai23:'Tây Nguyên',bai24:'Đông Nam Bộ',bai25:'ĐB Sông Cửu Long'};
const LVL   = {nhan_biet:'Nhận biết',thong_hieu:'Thông hiểu',van_dung:'Vận dụng'};
const LVL_CLS = {nhan_biet:'nb',thong_hieu:'th',van_dung:'vd'};

function init(){ renderTopicTabs(); renderTypeTabs(); renderContent(); }

function renderTopicTabs(){
  document.getElementById('topicTabs').innerHTML = KEYS.map(k=>
    `<button class="topic-tab${k===topic?' active':''}" onclick="setTopic('${k}')">${ICONS[k]} ${SHORT[k]}</button>`
  ).join('');
}
function renderTypeTabs(){
  const d = GEO[topic];
  const mcqN = d.mcq.nhan_biet.length+d.mcq.thong_hieu.length+d.mcq.van_dung.length;
  document.getElementById('typeTabs').innerHTML = `
    <button class="type-btn${type==='mcq'?' active':''}" onclick="setType('mcq')">📝 Nhiều lựa chọn <span class="type-badge">${mcqN}</span></button>
    <button class="type-btn${type==='ds'?' active':''}" onclick="setType('ds')">✅ Đúng / Sai <span class="type-badge">${d.ds.length}</span></button>
    <button class="type-btn${type==='tln'?' active':''}" onclick="setType('tln')">✍️ Trả lời ngắn <span class="type-badge">${d.tln.length}</span></button>`;
}

function getQuestions(){
  const d = GEO[topic];
  if(type==='mcq'){
    if(level==='all') return [
      ...d.mcq.nhan_biet.map(q=>({...q,_level:'nhan_biet'})),
      ...d.mcq.thong_hieu.map(q=>({...q,_level:'thong_hieu'})),
      ...d.mcq.van_dung.map(q=>({...q,_level:'van_dung'}))
    ];
    return d.mcq[level].map(q=>({...q,_level:level}));
  }
  return type==='ds' ? GEO[topic].ds : GEO[topic].tln;
}

function makeQid(q){
  if(type==='mcq') return `${topic}-mcq-${q._level}-${q.id}`;
  if(type==='ds')  return `${topic}-ds-${q.id}`;
  return `${topic}-tln-${q.id}`;
}

function renderStats(){
  const qs = getQuestions(); let done=0, correct=0;
  qs.forEach(q=>{ const a=answered[makeQid(q)]; if(a){done++; if(a.correct) correct++;} });
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip">📚 Tổng: <span>${qs.length} câu</span></div>
    <div class="stat-chip">✏️ Đã làm: <span>${done}/${qs.length}</span></div>
    ${done>0?`<div class="stat-chip">✅ Đúng: <span>${correct}/${done}</span></div>
    <div class="stat-chip">📊 Tỉ lệ: <span>${Math.round(correct/done*100)}%</span></div>`:''}`;
  const pct = qs.length>0 ? Math.round(done/qs.length*100) : 0;
  document.getElementById('progressBar').style.width = pct+'%';
}

function h(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ─── RESET ─────────────────────────────────────────────── */
function resetBtn(qid, qtype){
  return `<div class="reset-row"><button class="reset-btn" onclick="resetQ('${qid}','${qtype}')">↺ Làm lại câu này</button></div>`;
}

function resetQ(qid, qtype){
  delete answered[qid];
  if(qtype==='ds') delete dsSel[qid];
  // Re-render the single card in-place
  const card = document.getElementById('qc-'+qid);
  if(!card) return;
  let html = '';
  if(qtype==='mcq'){
    const parts = qid.split('-'); // topic-mcq-lv-id
    const lv = parts[2], id = parseInt(parts[3]);
    const q = GEO[topic].mcq[lv]?.find(q=>q.id===id);
    if(q){ q._level=lv; html=buildMCQCard(q,qid,null); }
  } else if(qtype==='ds'){
    const id = parseInt(qid.split('-').pop());
    const q = GEO[topic].ds.find(q=>q.id===id);
    if(q) html=buildDSCard(q,qid,null);
  } else {
    const id = parseInt(qid.split('-').pop());
    const q = GEO[topic].tln.find(q=>q.id===id);
    if(q) html=buildTLNCard(q,qid,null);
  }
  if(html){ card.outerHTML=html; }
  renderStats();
}

/* ─── MCQ ───────────────────────────────────────────────── */
function renderMCQ(){
  const qs = getQuestions();
  const levels = level==='all' ? ['nhan_biet','thong_hieu','van_dung'] : [level];
  let html='';
  levels.forEach(lv=>{
    const group = qs.filter(q=>q._level===lv);
    if(!group.length) return;
    html+=`<div class="sec-header"><div class="sec-header-icon">📝</div>
      <div><h2>${LVL[lv]}</h2><p>${group.length} câu · Chọn đáp án đúng</p></div></div>`;
    group.forEach(q=>{ html+=buildMCQCard(q,makeQid(q),answered[makeQid(q)]); });
  });
  return html;
}

function buildMCQCard(q,qid,a){
  const optsHtml = Object.entries(q.options).map(([lt,txt])=>{
    let cls='';
    if(a){ if(lt===q.correct) cls='show-correct'; if(lt===a.selected) cls=a.correct?'correct':'wrong'; }
    return `<div class="opt${cls?' '+cls:''} locked" onclick="pickOpt('${qid}','${lt}',this)" data-l="${lt}">
      <div class="opt-letter">${lt}</div><div class="opt-text">${h(txt)}</div></div>`;
  }).join('');

  let fbHtml='';
  if(a){
    if(a.correct) fbHtml=`<div class="feedback correct">🎉 <strong>Chính xác!</strong></div>`;
    else { const ans=h(q.options[q.correct]||'');
      fbHtml=`<div class="feedback wrong">❌ <strong>Chưa đúng.</strong> Đáp án đúng là <strong>${q.correct}</strong>${ans?`: <span class="correct-ans">${ans}</span>`:''}</div>`; }
  }

  const lvChip=`<span class="level-chip ${LVL_CLS[q._level]||'nb'}">${LVL[q._level]||''}</span>`;

  return `<div class="q-card" id="qc-${qid}">
    <div class="q-card-head" onclick="toggleCard('${qid}')">
      <div class="q-num">${q.id}</div>
      <div class="q-text">${h(q.text)}${level==='all'?lvChip:''}</div>
      <div class="q-toggle">▼</div>
    </div>
    <div class="q-divider"></div>
    <div class="q-body"><div class="q-inner">
      <div class="options-grid" id="og-${qid}">${optsHtml}</div>
      <div id="fb-${qid}">${fbHtml}</div>
      ${a ? resetBtn(qid,'mcq') : ''}
    </div></div>
  </div>`;
}

function pickOpt(qid,selected,el){
  if(answered[qid]) return;
  const [,, lv, id] = qid.split('-');
  const qData = GEO[topic].mcq[lv]?.find(q=>String(q.id)===id);
  if(!qData) return;
  const correct = qData.correct;
  const isOk = selected===correct;
  answered[qid]={correct:isOk,selected};
  document.querySelectorAll(`#og-${qid} .opt`).forEach(opt=>{
    const lt=opt.dataset.l;
    if(lt===correct) opt.classList.add('show-correct');
    if(lt===selected) opt.classList.add(isOk?'correct':'wrong');
  });
  const fbEl=document.getElementById(`fb-${qid}`);
  if(fbEl){
    if(isOk) fbEl.innerHTML=`<div class="feedback correct">🎉 <strong>Chính xác!</strong></div>`;
    else { const ans=h(qData.options[correct]||'');
      fbEl.innerHTML=`<div class="feedback wrong">❌ <strong>Chưa đúng.</strong> Đáp án đúng là <strong>${correct}</strong>${ans?`: <span class="correct-ans">${ans}</span>`:''}</div>`; }
    // append reset row after feedback
    const rrow = document.createElement('div');
    rrow.className='reset-row';
    rrow.innerHTML=`<button class="reset-btn" onclick="resetQ('${qid}','mcq')">↺ Làm lại câu này</button>`;
    fbEl.parentNode.appendChild(rrow);
  }
  renderStats();
}

/* ─── DS ────────────────────────────────────────────────── */
function renderDS(){
  const qs = GEO[topic].ds;
  let html=`<div class="sec-header"><div class="sec-header-icon">✅</div>
    <div><h2>Đúng / Sai</h2><p>${qs.length} câu · Chọn Đúng hoặc Sai cho mỗi phát biểu rồi kiểm tra</p></div></div>`;
  qs.forEach(q=>{ const qid=`${topic}-ds-${q.id}`; html+=buildDSCard(q,qid,answered[qid]); });
  return html;
}

function buildDSCard(q,qid,a){
  const ctxHtml = q.context ? `<div class="context-box"><div class="context-label">📖 Thông tin / Bảng số liệu</div>${h(q.context)}</div>` : '';
  const stmtsHtml = q.statements.map(s=>{
    let cls='', rightCol='';
    if(a){
      const isOk=(a.stmts[s.letter]===s.correct);
      cls=isOk?'answered-correct':'answered-wrong';
      rightCol=s.correct?`<span class="answer-tag true">✓ Đúng</span>`:`<span class="answer-tag false">✗ Sai</span>`;
    } else {
      const sel=dsSel[qid]?.[s.letter];
      rightCol=`<div class="stmt-right">
        <button class="ds-btn ${sel===true?'sel-true':''}" id="dsT-${qid}-${s.letter}" onclick="dsPick('${qid}','${s.letter}',true)">Đúng</button>
        <button class="ds-btn ${sel===false?'sel-false':''}" id="dsF-${qid}-${s.letter}" onclick="dsPick('${qid}','${s.letter}',false)">Sai</button>
      </div>`;
    }
    return `<div class="stmt ${cls}" id="stmt-${qid}-${s.letter}">
      <div class="stmt-letter">${s.letter.toUpperCase()}</div>
      <div class="stmt-text">${h(s.text)}</div>
      ${rightCol}
    </div>`;
  }).join('');

  let bottomHtml='';
  if(a){
    const tot=q.statements.length, cor=q.statements.filter(s=>a.stmts[s.letter]===s.correct).length;
    bottomHtml=`<div class="feedback ${cor===tot?'correct':'wrong'}">${cor===tot?'🎉 <strong>Hoàn toàn chính xác!</strong>':`📊 Bạn đúng <strong>${cor}/${tot}</strong> phát biểu`}</div>`;
  } else {
    bottomHtml=`<div class="btn-row">
      <button class="check-btn" onclick="submitDS('${qid}')">Kiểm tra</button>
      <span id="ds-hint-${qid}" style="font-size:12px;color:var(--text3)">Chọn Đúng/Sai cho tất cả phát biểu trước</span>
    </div>`;
  }

  return `<div class="q-card" id="qc-${qid}">
    <div class="q-card-head" onclick="toggleCard('${qid}')">
      <div class="q-num">${q.id}</div>
      <div class="q-text">Câu ${q.id} — ${q.statements.length} phát biểu</div>
      <div class="q-toggle">▼</div>
    </div>
    <div class="q-divider"></div>
    <div class="q-body"><div class="q-inner">
      ${ctxHtml}
      <div class="stmt-list">${stmtsHtml}</div>
      <div id="ds-bottom-${qid}">${bottomHtml}</div>
      ${a ? resetBtn(qid,'ds') : ''}
    </div></div>
  </div>`;
}

function dsPick(qid,sid,val){
  if(answered[qid]) return;
  if(!dsSel[qid]) dsSel[qid]={};
  dsSel[qid][sid]=val;
  const t=document.getElementById(`dsT-${qid}-${sid}`);
  const f=document.getElementById(`dsF-${qid}-${sid}`);
  if(t) t.className='ds-btn'+(val===true?' sel-true':'');
  if(f) f.className='ds-btn'+(val===false?' sel-false':'');
}

function submitDS(qid){
  const q = GEO[topic].ds.find(q=>`${topic}-ds-${q.id}`===qid);
  if(!q) return;
  const sel=dsSel[qid]||{};
  const missing=q.statements.filter(s=>sel[s.letter]===undefined);
  if(missing.length>0){
    const hint=document.getElementById(`ds-hint-${qid}`);
    if(hint){hint.style.color='var(--red)';hint.textContent=`Còn ${missing.length} phát biểu chưa được chọn!`;}
    return;
  }
  let correct=0;
  q.statements.forEach(s=>{
    const isOk=(sel[s.letter]===s.correct);
    if(isOk) correct++;
    const stmtEl=document.getElementById(`stmt-${qid}-${s.letter}`);
    if(stmtEl){
      stmtEl.classList.add(isOk?'answered-correct':'answered-wrong');
      const rightEl=stmtEl.querySelector('.stmt-right');
      if(rightEl) rightEl.outerHTML=s.correct?`<span class="answer-tag true">✓ Đúng</span>`:`<span class="answer-tag false">✗ Sai</span>`;
    }
  });
  answered[qid]={done:true,correct:correct===q.statements.length,stmts:sel,score:correct};
  const bottomEl=document.getElementById(`ds-bottom-${qid}`);
  if(bottomEl){
    const tot=q.statements.length;
    bottomEl.innerHTML=`<div class="feedback ${correct===tot?'correct':'wrong'}">${correct===tot?'🎉 <strong>Hoàn toàn chính xác!</strong>':`📊 Bạn đúng <strong>${correct}/${tot}</strong> phát biểu`}</div>`;
    // add reset button below
    const inner=bottomEl.parentNode;
    const rr=document.createElement('div'); rr.className='reset-row';
    rr.innerHTML=`<button class="reset-btn" onclick="resetQ('${qid}','ds')">↺ Làm lại câu này</button>`;
    inner.appendChild(rr);
  }
  renderStats();
}

/* ─── TLN ───────────────────────────────────────────────── */
function renderTLN(){
  const qs = GEO[topic].tln;
  let html=`<div class="sec-header"><div class="sec-header-icon">✍️</div>
    <div><h2>Trả Lời Ngắn</h2><p>${qs.length} câu · Tính toán rồi nhập kết quả để kiểm tra</p></div></div>`;
  qs.forEach(q=>{ const qid=`${topic}-tln-${q.id}`; html+=buildTLNCard(q,qid,answered[qid]); });
  return html;
}

function buildTLNCard(q,qid,a){
  const inputRow = a ? '' : `<textarea class="tln-input" id="inp-${qid}" placeholder="Nhập kết quả của bạn (ví dụ: 60 hoặc 82,7)…" rows="2"></textarea>`;

  let btnRow='';
  if(a){
    btnRow=`<div class="btn-row"><button class="reveal-btn" onclick="revealAns('${qid}')">🔍 Xem đáp án & giải</button></div>`;
  } else {
    btnRow=`<div class="btn-row" id="tln-row-${qid}">
      <button class="check-btn" onclick="checkTLN('${qid}')">✓ Kiểm tra đáp án</button>
      <button class="reveal-btn" onclick="revealAns('${qid}')">🔍 Xem ngay đáp án</button>
    </div>`;
  }

  const ansBox=`<div class="answer-box" id="ans-${qid}">
    <div class="answer-label">Đáp án & Giải</div>
    <div class="answer-val">${h(q.answer)}</div>
    ${q.explanation&&q.explanation!==q.answer?`<div class="answer-expl">${h(q.explanation)}</div>`:''}
  </div>`;

  return `<div class="q-card" id="qc-${qid}">
    <div class="q-card-head" onclick="toggleCard('${qid}')">
      <div class="q-num">${q.id}</div>
      <div class="q-text">${h(q.question.substring(0,100))}${q.question.length>100?'…':''}</div>
      <div class="q-toggle">▼</div>
    </div>
    <div class="q-divider"></div>
    <div class="q-body"><div class="q-inner">
      <div class="tln-question">${h(q.question)}</div>
      ${inputRow}
      ${a ? btnRow : ''}
      ${!a ? btnRow : ''}
      <div id="tln-fb-${qid}"></div>
      ${ansBox}
      ${a ? resetBtn(qid,'tln') : ''}
    </div></div>
  </div>`;
}

/* Extract the final numeric value from an answer string like "≈ 82,7" or "≈ 60 tạ/ha" */
function extractExpected(ansStr){
  if(!ansStr) return null;
  // Normalize Vietnamese decimal comma to dot
  const norm = ansStr.replace(/,/g,'.');
  // Get all numbers in the string
  const nums = norm.match(/-?\d+(?:\.\d+)?/g);
  if(!nums||!nums.length) return null;
  return parseFloat(nums[nums.length-1]);
}
function parseUserNum(str){
  const norm = str.trim().replace(/,/g,'.').replace(/\s/g,'');
  const m = norm.match(/-?\d+(?:\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}

function checkTLN(qid){
  const inp=document.getElementById(`inp-${qid}`);
  if(!inp){ revealAns(qid); return; }
  const userStr=inp.value.trim();
  if(!userStr){ inp.style.borderColor='var(--red)'; inp.placeholder='Hãy nhập kết quả của bạn!'; return; }

  const id=parseInt(qid.split('-').pop());
  const q=GEO[topic].tln.find(q=>q.id===id);
  const fbEl=document.getElementById(`tln-fb-${qid}`);
  const rowEl=document.getElementById(`tln-row-${qid}`);

  if(!q||!q.answer){
    // No stored answer → just reveal
    revealAns(qid);
    return;
  }

  const expected=extractExpected(q.answer);
  const userVal=parseUserNum(userStr);

  let isOk=false;
  if(expected!==null && userVal!==null){
    // Tolerance: 2% relative OR 0.6 absolute (whichever is larger)
    const tol=Math.max(Math.abs(expected)*0.02, 0.6);
    isOk=Math.abs(userVal-expected)<=tol;
  }

  answered[qid]={done:true,correct:isOk};

  // Remove input
  if(inp) inp.remove();

  // Update button row
  if(rowEl) rowEl.innerHTML=`<div class="btn-row"><button class="reveal-btn" onclick="revealAns('${qid}')">🔍 Xem đáp án & giải</button></div>`;

  // Show feedback
  if(fbEl){
    if(isOk){
      fbEl.innerHTML=`<div class="feedback correct" style="margin-bottom:10px">🎉 <strong>Chính xác!</strong> Kết quả <strong>${h(userStr)}</strong> của bạn đúng!</div>`;
    } else {
      fbEl.innerHTML=`<div class="feedback wrong" style="margin-bottom:10px">❌ <strong>Chưa đúng.</strong> Bạn nhập: <strong>${h(userStr)}</strong>. Xem đáp án bên dưới.</div>`;
      revealAns(qid); // auto-reveal on wrong
    }
    // append reset button
    const card=document.getElementById(`qc-${qid}`);
    const inner=fbEl.parentNode;
    if(!inner.querySelector('.reset-row')){
      const rr=document.createElement('div'); rr.className='reset-row';
      rr.innerHTML=`<button class="reset-btn" onclick="resetQ('${qid}','tln')">↺ Làm lại câu này</button>`;
      inner.appendChild(rr);
    }
  }
  renderStats();
}

function revealAns(qid){
  const el=document.getElementById(`ans-${qid}`);
  if(el) el.classList.add('visible');
  const card=document.getElementById(`qc-${qid}`);
  if(card) card.classList.remove('collapsed');
  if(!answered[qid]){ answered[qid]={done:true,correct:true}; renderStats(); }
}

/* ─── UTILS ─────────────────────────────────────────────── */
function renderContent(){
  document.getElementById('levelBar').style.display=type==='mcq'?'flex':'none';
  let html='';
  if(type==='mcq') html=renderMCQ();
  else if(type==='ds') html=renderDS();
  else html=renderTLN();
  document.getElementById('questionContainer').innerHTML=html;
  renderStats();
}
function toggleCard(qid){ document.getElementById('qc-'+qid)?.classList.toggle('collapsed'); }
function setTopic(k){ topic=k; level='all'; resetLevelBtns(); renderTopicTabs(); renderTypeTabs(); renderContent(); }
function setType(t){ type=t; level='all'; resetLevelBtns(); renderTypeTabs(); renderContent(); }
function filterLevel(btn){ level=btn.dataset.level; resetLevelBtns(); btn.classList.add('active'); renderContent(); }
function resetLevelBtns(){ document.querySelectorAll('.level-btn').forEach(b=>b.classList.toggle('active',b.dataset.level==='all')); }

init();
</script>
