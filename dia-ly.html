<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Địa lý — Ngân Hàng Câu Hỏi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--panel:#141c2e;--border:#1e2d4a;
  --accent1:#4f9cf9;--accent2:#7c5af0;
  --text:#e8edf5;--text2:#8fa3c0;--text3:#5a7291;
  --green:#34d399;--red:#f87171;--yellow:#facc15;
  --dia:#38d9a9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh}

.hero{text-align:center;padding:40px 24px 28px;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(56,217,169,.12) 0%,transparent 70%);pointer-events:none}
.badge{display:inline-block;background:linear-gradient(135deg,rgba(56,217,169,.15),rgba(79,156,249,.15));border:1px solid rgba(56,217,169,.3);color:var(--dia);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px}
.hero h1{font-size:clamp(22px,4vw,40px);font-weight:800;background:linear-gradient(135deg,#fff 0%,var(--dia) 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero p{color:var(--text2);font-size:14px}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text2);text-decoration:none;font-size:13px;font-weight:600;transition:.2s;position:absolute;top:20px;left:20px}
.back-link:hover{border-color:var(--dia);color:var(--dia)}

.topic-tabs{display:flex;gap:8px;padding:0 20px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.topic-tab{padding:10px 20px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;flex:1;min-width:155px;text-align:center}
.topic-tab:hover{border-color:rgba(56,217,169,.4);color:var(--dia)}
.topic-tab.active{background:rgba(56,217,169,.12);border-color:rgba(56,217,169,.5);color:var(--dia)}

.type-bar{display:flex;gap:8px;padding:0 20px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.type-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text2);font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
.type-btn.active{background:rgba(79,156,249,.12);border-color:rgba(79,156,249,.4);color:var(--accent1)}
.type-btn:hover:not(.active){border-color:rgba(79,156,249,.25);color:var(--accent1)}
.type-badge{background:rgba(79,156,249,.2);color:var(--accent1);font-size:10px;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace}

.stats-bar{display:flex;gap:10px;padding:0 20px 16px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.stat-chip{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.stat-chip span{font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}

.level-bar{display:flex;gap:6px;padding:0 20px 16px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.level-btn{padding:5px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:.2s}
.level-btn.active{color:var(--text);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.05)}

.section-wrap{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--dia),var(--accent1));border-radius:2px;transition:.4s}

.sec-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px 20px;border-radius:14px;border:1px solid var(--border);background:var(--panel);position:relative;overflow:hidden}
.sec-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--dia),var(--accent1));border-radius:4px 0 0 4px}
.sec-header-icon{width:40px;height:40px;border-radius:10px;background:rgba(56,217,169,.12);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sec-header h2{font-size:17px;font-weight:700}
.sec-header p{font-size:12px;color:var(--text2);margin-top:2px}

.q-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:box-shadow .2s}
.q-card:hover{box-shadow:0 0 0 1px rgba(56,217,169,.2)}
.q-card-head{padding:14px 16px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;user-select:none}
.q-num{min-width:34px;height:34px;border-radius:9px;background:rgba(56,217,169,.1);color:var(--dia);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.q-text{flex:1;font-size:14px;font-weight:600;line-height:1.5;color:var(--text)}
.q-toggle{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);transition:.25s;flex-shrink:0;margin-top:2px}
.q-card.collapsed .q-toggle{transform:rotate(-180deg)}
.q-divider{height:1px;margin:0 16px;background:var(--border);opacity:.5}
.q-body{overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);max-height:1400px}
.q-card.collapsed .q-body{max-height:0}
.q-inner{padding:14px 16px 18px}

/* MCQ */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:580px){.options-grid{grid-template-columns:1fr}}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:.15s;background:rgba(255,255,255,.015)}
.opt:hover:not(.locked){border-color:rgba(79,156,249,.35);background:rgba(79,156,249,.06)}
.opt.correct{border-color:var(--green)!important;background:rgba(52,211,153,.1)!important}
.opt.wrong{border-color:var(--red)!important;background:rgba(248,113,113,.08)!important}
.opt.show-correct{border-color:rgba(52,211,153,.5)!important;background:rgba(52,211,153,.06)!important}
.opt-letter{min-width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);transition:.15s}
.opt.correct .opt-letter,.opt.show-correct .opt-letter{background:var(--green);color:#000}
.opt.wrong .opt-letter{background:var(--red);color:#fff}
.opt-text{font-size:13px;line-height:1.5;color:var(--text2)}
.opt.correct .opt-text,.opt.wrong .opt-text{color:var(--text)}

/* FEEDBACK */
.feedback{border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.5}
.feedback.correct{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--green)}
.feedback.wrong{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.feedback.wrong .correct-ans{color:var(--text);font-weight:600}

/* RESET BTN */
.reset-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.reset-btn:hover{border-color:rgba(250,204,21,.4);color:var(--yellow);background:rgba(250,204,21,.05)}
.reset-row{display:flex;justify-content:flex-end;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}

/* DS */
.context-box{background:rgba(255,255,255,.022);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-line}
.context-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.stmt-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.stmt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.015);transition:.2s}
.stmt.answered-correct{border-color:rgba(52,211,153,.4)!important;background:rgba(52,211,153,.06)!important}
.stmt.answered-wrong{border-color:rgba(248,113,113,.3)!important;background:rgba(248,113,113,.05)!important}
.stmt-letter{min-width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2);transition:.15s}
.stmt.answered-correct .stmt-letter{background:var(--green);color:#000}
.stmt.answered-wrong .stmt-letter{background:var(--red);color:#fff}
.stmt-text{flex:1;font-size:13px;line-height:1.5;color:var(--text2)}
.stmt-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ds-btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border);font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--text3);transition:.15s;white-space:nowrap}
.ds-btn:hover{background:rgba(255,255,255,.06)}
.ds-btn.sel-true{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.5);color:var(--green)}
.ds-btn.sel-false{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:var(--red)}
.answer-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap}
.answer-tag.true{background:rgba(52,211,153,.15);color:var(--green)}
.answer-tag.false{background:rgba(248,113,113,.12);color:var(--red)}

.btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.check-btn{padding:8px 20px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.check-btn:hover{opacity:.88}

/* TLN */
.tln-question{background:rgba(255,255,255,.022);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-line}
.tln-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:14px;transition:.2s;resize:vertical;min-height:56px;margin-bottom:12px}
.tln-input:focus{outline:none;border-color:var(--accent1);background:rgba(79,156,249,.05)}
.reveal-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text2);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.reveal-btn:hover{border-color:rgba(250,204,21,.4);color:var(--yellow)}
.answer-box{display:none;margin-top:12px;border-radius:10px;border:1px solid rgba(56,217,169,.3);background:rgba(56,217,169,.07);padding:14px}
.answer-box.visible{display:block}
.answer-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dia);margin-bottom:6px}
.answer-val{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--green);font-weight:700;margin-bottom:8px}
.answer-expl{font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-line;border-top:1px solid rgba(56,217,169,.2);padding-top:8px;margin-top:4px}

.level-chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-left:6px;vertical-align:middle}
.level-chip.nb{background:rgba(56,217,169,.15);color:var(--dia)}
.level-chip.th{background:rgba(250,204,21,.12);color:var(--yellow)}
.level-chip.vd{background:rgba(248,113,113,.12);color:var(--red)}

.page-footer{text-align:center;padding:20px;color:var(--text3);font-size:12px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="hero">
  <a class="back-link" href="index.html">← Trang chủ</a>
  <div class="badge">🌏 Địa lý · 4 Chuyên Đề</div>
  <h1>Ôn Tập Địa Lý</h1>
  <p>Chọn chuyên đề và dạng bài để bắt đầu luyện tập</p>
</div>

<div class="topic-tabs" id="topicTabs"></div>
<div class="type-bar" id="typeTabs"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="level-bar" id="levelBar" style="display:none">
  <button class="level-btn active" data-level="all" onclick="filterLevel(this)">Tất cả</button>
  <button class="level-btn" data-level="nhan_biet" onclick="filterLevel(this)">Nhận biết</button>
  <button class="level-btn" data-level="thong_hieu" onclick="filterLevel(this)">Thông hiểu</button>
  <button class="level-btn" data-level="van_dung" onclick="filterLevel(this)">Vận dụng</button>
</div>

<div class="section-wrap">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="questionContainer"></div>
</div>
<div class="page-footer">THPT Phan Châu Trinh</div>

<script>
const GEO = {"bai22": {"name": "Duyên hải Nam Trung Bộ", "mcq": {"nhan_biet": [{"id": 1, "text": "Duyên hải Nam Trung Bộ có tiềm năng nổi bật nhất trong phát\ntriển hoạt động kinh tế nào sau đây?", "options": {"A": "Kinh tế biển", "B": "Sản xuất lương thực", "C": "Thủy điện", "D": "Khai thác khoáng sản"}, "correct": "A"}, {"id": 2, "text": "Khu du lịch biển đảo Sơn Trà thuộc tỉnh/thành phố nào sau\nđây?", "options": {"A": "Quảng Nam", "B": "Đà Nẵng", "C": "Quảng Ngãi", "D": "Bình Định"}, "correct": "B"}, {"id": 3, "text": "Nguyên nhân chủ yếu để Duyên hải Nam Trung Bộ có ưu thế hơn\nBắc Trung Bộ trong khai thác hải sản là", "options": {"A": "có các ngư trường rộng lớn", "B": "tất cả các tỉnh đều giáp biển", "C": "có nhiều vũng, vịnh, đầm phá", "D": "điều kiện hải văn thuận lợi"}, "correct": "A"}, {"id": 4, "text": "Thuận lợi chủ yếu của việc nuôi trồng thủy sản ở Duyên hải\nNam Trung Bộ là", "options": {"A": "bờ biển có nhiều vũng vịnh, đầm phá", "B": "có nhiều loài cá quý, loài tôm mực", "C": "liền kề với các ngư trường rộng lớn", "D": "hoạt động chế biến hải sản đa dạng"}, "correct": "A"}, {"id": 5, "text": "Dầu khí của Duyên hải Nam Trung Bộ được khai thác chủ yếu ở", "options": {"A": "Đà Nẵng", "B": "Quảng Nam", "C": "Bình Định", "D": "Bình Thuận"}, "correct": "D"}, {"id": 6, "text": "Khu du lịch biển đảo Cù Lao Chàm thuộc tỉnh/thành phố nào sau\nđây?", "options": {"A": "Quảng Nam", "B": "Đà Nẵng", "C": "Quảng Ngãi", "D": "Bình Định"}, "correct": "A"}, {"id": 7, "text": "Số lượng các tỉnh/thành phố trực thuộc Trung ương của vùng\nDuyên hải Nam Trung Bộ là", "options": {"A": "5", "B": "6", "C": "8", "D": "10"}, "correct": "C"}, {"id": 8, "text": "Khu du lịch biển đảo Lý Sơn thuộc tỉnh nào sau đây?", "options": {"A": "Bình Thuận", "B": "Ninh Thuận", "C": "Quảng Ngãi", "D": "Bình Định"}, "correct": "C"}, {"id": 9, "text": "Từ Bắc vào Nam của vùng Duyên hải Nam Trung bắt đầu thành phố\nĐà Nẵng đến tỉnh", "options": {"A": "Bình Thuận", "B": "Ninh Thuận", "C": "Khánh Hòa", "D": "Bình Định"}, "correct": "A"}, {"id": 10, "text": "Vùng Duyên hải Nam Trung Bộ đang tiến hành khai thác các mỏ\ndầu khí ở đảo", "options": {"A": "Phú Quý", "B": "Lý Sơn", "C": "Tri Tôn", "D": "Phan Vinh"}, "correct": "A"}, {"id": 11, "text": "Duyên hải Nam Trung Bộ đã hình thành một số vùng nuôi tôm\nthâm canh với quy mô lớn chủ yếu ở các tỉnh nào sau đây?", "options": {"A": "Đà Nẵng, Quảng Nam", "B": "Quảng Ngãi, Bình Định", "C": "Phú Yên, Khánh Hòa", "D": "Ninh Thuận, Bình Thuận"}, "correct": "C"}, {"id": 12, "text": "Trung tâm du lịch quan trọng nhất của vùng Duyên hải Nam\nTrung Bộ là", "options": {"A": "Nha Trang", "B": "Phan Thiết", "C": "Đà Nẵng", "D": "Quảng Ngãi"}, "correct": "C"}, {"id": 13, "text": "Quần đảo Hoàng Sa và quần đảo Trường Sa lần lượt thuộc các\ntỉnh/thành phố nào sau đây?", "options": {"A": "Thành phố Đà Nẵng và tỉnh Quảng Ngãi", "B": "Tỉnh Quảng Ngãi và thành phố Đã Nẵng", "C": "Tỉnh Khánh Hòa và thành phố Đà Nẵng", "D": "Thành phố Đà Nẵng và tỉnh Khánh Hòa"}, "correct": "D"}, {"id": 14, "text": "Các đồng muối nổi tiếng của vùng Duyên hải Nam Trung Bộ là", "options": {"A": "Thuận An, Văn Lý", "B": "Cà Ná, Sa Huỳnh", "C": "Cà Ná, Văn Lý", "D": "Sa Huỳnh, Thuận An"}, "correct": "B"}, {"id": 15, "text": "Khu du lịch biển đảo Quy Nhơn thuộc tỉnh nào sau đây?", "options": {"A": "Quảng Nam", "B": "Bình Thuận", "C": "Quảng Ngãi", "D": "Bình Định"}, "correct": "D"}, {"id": 16, "text": "Trong tương lai, cảng biển nào sau đây ở Duyên hải Nam Trung\nBộ sẽ là cảng trung chuyển quốc tế lớn nhất cả nước?", "options": {"A": "Đà Nẵng", "B": "Dung Quất", "C": "Quy Nhơn", "D": "Vân Phong"}, "correct": "D"}, {"id": 17, "text": "Khu du lịch biển đảo Nha Trang thuộc tỉnh nào sau đây?", "options": {"A": "Khánh Hoà", "B": "Phú Yên", "C": "Quảng Ngãi", "D": "Bình Định"}, "correct": "A"}, {"id": 18, "text": "Thương hiệu nước mắm nổi tiếng nào sau đây thuộc tỉnh Bình\nThuận?", "options": {"A": "Nha Trang", "B": "Phan Thiết", "C": "Quy Nhơn", "  "nhà máy chế biến thực phẩm"}, "correct": "A"}, {"id": 16, "text": "Ngành kinh tế nào sau đây có điều kiện thuận lợi nhất để\nphát triển ở Duyên hài Nam Trung Bộ?", "options": {"A": "Trồng trọt", "B": "Chăn nuôi", "C": "Thủy sản", "D": "Khai khoáng"}, "correct": "C"}, {"id": 17, "text": "Biện pháp chủ yếu để phát triển bền vững ngành thuỷ sản ở\nDuyên hải Nam Trung Bộ là", "options": {"A": "hiện đại hoá phương tiện, thiết bị đánh bắt", "B": "khai thác hợp lí đi đôi với bảo vệ nguồn lợi", "C": "tăng cường đầu tư nuôi trồng nước mặn, lợ", "D": "chú trọng phòng chống dịch bệnh, thiên tai"}, "correct": "B"}, {"id": 18, "text": "Du lịch biển của Duyên hải Nam Trung Bộ hiện nay phát triển\nmạnh chủ yếu do", "options": {"A": "phát triển cơ sở hạ tầng, tài nguyên đa dạng", "B": "tạo ra sản phẩm đa dạng, phát triển nhân lực", "C": "nhiều tài nguyên giá trị cao, đổi mới quản lí", "D": "có di sản thế giới, nhiều dịch vụ khác nhau"}, "correct": "B"}, {"id": 19, "text": "Phát biểu nào sau đây không đúng về điều kiện kinh tế - xã\nhội của Duyên hải Nam Trung Bộ?", "options": {"A": "Có quy mô dân số lớn, nguồn lao động khá dồi dào", "B": "Lao động cần cù, trình độ ngày càng được nâng cao", "C": "Cơ sở hạ tầng, vật chất kĩ thuật ngày càng hiện đại", "D": "Tỉ lệ dân thành thị thấp, quá trình đô thị hoá chậm"}, "correct": "D"}, {"id": 20, "text": "Nguồn lao động ở Duyên hải Nam Trung Bộ", "options": {"A": "khá dồi dào, trình độ ngày càng được nâng cao", "B": "hầu hết tập trung hoạt động ở vùng nông thôn", "C": "phần lớn làm việc ở khu vực đầu tư nước ngoài", "D": "hàng năm tăng thêm khoảng một triệu người"}, "correct": "A"}, {"id": 21, "text": "Phát biểu nào sau đây không thể hiện ý nghĩa của sự phát\ntriển kinh tế biển ở Duyên hải Nam Trung Bộ đối với an ninh quốc phòng?", "options": {"A": "nâng cao vị thế trong đối ngoại, hợp tác quốc tế về biển", "B": "cơ sở khẳng định chủ quyền biển đảo và bảo vệ lãnh thổ", "C": "làm nền tảng trong việc phát triển an ninh và quốc phòng", "D": "nâng cao hiệu quả hoạt động khai thác tài nguyên biển đảo"}, "correct": "D"}, {"id": 22, "text": "Khó khăn chủ yếu của việc đánh bắt hải sản xa bờ ở Duyên hải\nNam Trung Bộ là", "options": {"A": "phương tiện đánh bắt còn hạn chế, dịch vụ nghề cá còn chưa mạnh", "B": "lao động đánh bắt ít được bổ sung, cơ sở hậu cần phục vụ còn yếu", "C": "trong năm xảy ra nhiều thiên tai, môi trường nhiều nơi bị ô nhiễm", "D": "công nghiệp chế biến còn hạn chế, các cơ sở chế biến khác nhỏ lẻ"}, "correct": "A"}], "van_dung": [{"id": 1, "text": "Điều kiện thuận lợi để sản xuất muối ở Duyên hải Nam Trung Bộ\nkhông phải là", "options": {"A": "không có các hệ thống sông ngòi lớn", "B": "địa hình bờ biển có nhiều vũng vịnh", "C": "số giờ nắng và gió trong năm nhiều", "D": "người dân có kinh nghiệm từ lâu đời"}, "correct": "B"}, {"id": 2, "text": "Thế mạnh nổi bật của Duyên hải Nam Trung Bộ trong phát triển\ngiao thông vận tải biển so với Bắc Trung Bộ là", "options": {"A": "nhiều vũng, vịnh nước sâu và gần tuyến hàng hải quốc tế", "B": "có nhiều địa điểm thuận lợi để xây dựng cảng tổng hợp", "C": "có nhiều đảo thuận lợi cho các tàu thuyền neo đậu, trú ẩn", "D": "vùng biển ít chịu ảnh hưởng của bão, gió mùa Đông Bắc"}, "correct": "A"}, {"id": 3, "text": "Ý nghĩa chủ yếu của việc hình thành các khu kinh tế ven biển\nở Duyên hải Nam Trung Bộ là", "options": {"A": "tăng cường thu hút nguồn đầu tư, đẩy mạnh sản xuất hàng hoá", "B": "giải quyết việc làm cho lao động, góp phần phân bố lại dân cư", "C": "mở rộng các đô thị, thúc đẩy sự chuyển dịch cơ cấu nền kinh tế", "D": "tăng cường kết cấu hạ tầng, làm thay đổi bộ mặt vùng ven biển"}, "correct": "A"}, {"id": 4, "text": "Thuận lợi chủ yếu về điều kiện kinh tế - xã hội ở Duyên hải\nNam Trung Bộ đối với phát triển du lịch là", "options": {"A": "quy mô dân số lớn, lao động dồi dào, cần cù và chịu khó", "B": "có nhiều nét đặc sắc về văn hoá, và truyền thống sản xuất", "C": "tỉ lệ dân thành thị cao và quá trình công nghiệp hoá nhanh", "D": "cơ sở hạ tầng và cơ sở vật chất kĩ thuật ngày càng hiện đại"}, "correct": "B"}, {"id": 5, "text": "Phát biểu nào sau đây không đúng với giao thông vận tải biển\nở Duyên hải Nam Trung Bộ?", "options": {"A": "Giữ vai trò quan trọng, tạo ra các quan hệ kinh tế trong và ngoài nước", "B": "Có nhiều cảng biển được xây dựng, một số cảng có vai trò quan trọng", "C": "Đã hình thành được nhiều cảng trung chuyển quốc tế lớn nhất cả nước", "D": "Khối lượng hàng hoá vận chuyển, hàng hoá luân chuyển ở đây khá lớn"}, "correct": "C"}, {"id": 6, "text": "Các trung tâm kinh tế của Duyên hải Nam Trung Bộ phân bố\nthành dải dọc ven biển chủ yếu là do", "options": {"A": "nhiều tài nguyên thiên nhiên, giao thông thuận lợi", "B": "cơ sở hạ tầng đảm bảo, cơ sở vật chất kĩ thuật tốt", "C": "dân cư và lao động đông đảo, vị trí địa lí thuận lợi", "D": "lịch sử khai thác từ lâu đời và thị trường rộng lớn"}, "correct": "C"}, {"id": 7, "text": "So với các vùng lãnh thổ khác của nước ta, Duyên hải Nam\nTrung Bộ có", "options": {"A": "nghề cá phát triển mạnh và toàn diện nhất", "B": "tài nguyên du lịch phong phú đa dạng hơn", "C": "nhiều địa điểm tốt để xây dựng các cảng biển", "D": "thuận lợi hơn để phát triển tổng hợp kinh tế biển"}, "correct": "C"}, {"id": 8, "text": "Nguyên nhân nào sau đây là chủ yếu làm cho dịch vụ hàng hải ở\nDuyên hải Nam Trung Bộ phát triển nhanh trong thời gian gần đây?", "options": {"A": "Gần đường hàng hải quốc tế", "B": "Kinh tế tăng trưởng nhanh", "C": "Nhiều vụng biển sâu, kín gió", "D": "Chất lượng lao động nâng lên"}, "correct": "B"}, {"id": 9, "text": "Hoạt động du lịch biển ở Duyên hải Nam Trung Bộ có thể diễn\nra thuận lợi quanh năm chủ yếu là do", "options": {"A": "sản phẩm du lịch đa dạng, ít chịu ảnh hưởng của gió mùa Đông Bắc", "B": "cơ sở vật chất kĩ thuật được đầu tư, mạng lưới giao thông phát triển", "C": "nhu cầu thị trường tăng nhanh và chất lượng lao động được nâng lên", "D": "có nhiều bãi biển đẹp, nhiều quần đảo, ít chịu ảnh hưởng của thiên tai"}, "correct": "A"}, {"id": 10, "text": "Ý nghĩa chủ yếu của việc phát triển cảng biển nước sâu ở\nDuyên hải Nam Trung Bộ không phải là", "options": {"A": "nâng cao năng lực vận chuyển, mở rộng liên kết kinh tế", "B": "khai thác thế mạnh của biển, phát triển kinh tế hàng hoá", "C": "đẩy mạnh ngoại thương, tạo điều kiện hội nhập quốc tế", "D": "đảm nhận vận tải hành khách, giải quyết thêm việc làm"}, "correct": "D"}, {"id": 11, "text": "Vai trò to lớn của các cảng biển ở Duyên hải Nam Trung Bộ\nđối với Tây Nguyên là", "options": {"A": "lối thông ra biển của các tỉnh ở Tây Nguyên", "B": "giúp cho Tây Nguyên lưu thông hàng hóa", "C": "đưa hàng Tây Nguyên về Duyên hải Nam Trung Bộ", "D": "gắn kinh tế Tây Nguyên với Duyên hải Nam Trung Bộ"}, "correct": "A"}, {"id": 12, "text": "Thuận lợi chủ yếu để phát triển dịch vụ hàng hải ở Duyên hải\nNam Trung Bộ là", "options": {"A": "có nhiều vịnh sâu xây cảng, hàng hoá có nhiều", "B": "nghề cá phát triển, vị trí kề đường biển quốc tế", "C": "có nhiều cửa sông xây cảng, du lịch phát triển", "D": "mở rộng quan hệ với nước bạn, tăng xuất khẩu"}, "correct": "A"}, {"id": 13, "text": "Điểm nổi bật của tự nhiên vùng Duyên hải Nam Trung Bộ là", "options": {"A": "lãnh thổ hẹp, nằm ở sườn Tây Trường Sơn, giáp biển", "B": "lãnh thổ kéo dài theo chiều Bắc - Nam, vị trí đón gió", "C": "lãnh thổ hẹp ngang, có mưa về thu đông và mùa khô kéo dài", "D": "lãnh thổ hẹp, bị chia cắt bởi các dãy núi đâm ngang ra biển"}, "correct": "C"}, {"id": 14, "text": "Ý nghĩa chủ yếu của các cảng nước sâu ở Duyên hải Nam Trung\nBộ là", "options": {"A": "góp phần vào việc chuyển dịch cơ cấu ngành", "B": "thúc đẩy chuyển dịch cơ cấu lãnh thổ kinh tế", "C": "tạo việc làm, thay đổi bộ mặt vùng ven biển", "D": "tăng vận chuyển, tiền đề tạo khu công nghiệp"}, "correct": "D"}, {"id": 15, "text": "Dải bờ biển Trung Bộ của nước ta thường xảy ra sạt lở chủ\nyếu do", "options": {"A": "thềm lục địa sâu, sóng biển lớn, biến đổi khí hậu", "B": "có nhiều bãi cát, ít rừng phòng hộ, cửa sông nhỏ", "C": "ít rừng phòng hộ, thủy triều lên cao, mưa theo mùa", "D": "thềm lục địa sâu, cửa sông nhỏ, con người tác động"}, "correct": "A"}, {"id": 16, "text": "Biện pháp chủ yếu để nâng cao giá trị sản xuất thủy sản ở\nDuyên hải Nam Trung Bộ là", "options": {"A": "đẩy mạnh chế biến, phát triển xuất khẩu", "B": "hiện đại hóa ngư cụ, đầu tư đánh bắt xa bờ", "C": "mở rộng dịch vụ, xây dựng các cảng cá", "D": "tăng cường thu hút các nguồn vốn đầu tư"}, "correct": "A"}, {"id": 17, "text": "Phát triển nghề cá ở Duyên hải Nam Trung Bộ có ý nghĩa chủ\nyếu nào sau đây?", "options": {"A": "Giải quyết việc làm, phát triển công nghiệp chế biến thủy sản", "B": "Giải quyết vấn đề thực phẩm, tạo nhiều sản phẩm hàng hóa", "C": "Sử dụng hiệu quả lao động, nâng cao mức sống người dân", "D": "Thu hút nguồn đầu tư, tận dụng diện tích mặt nước của vùng"}, "correct": "B"}, {"id": 18, "text": "Ý nghĩa chủ yếu của việc phát triển tổng hợp kinh tế biển ở\nDuyên hải Nam Trung Bộ là", "options": {"A": "nâng cao hiệu quả kinh tế, khai thác hợp lí và bảo vệ tài nguyên", "B": "bảo vệ chủ quyền biển đảo, tạo việc làm và tăng thêm thu nhập", "C": "thu hút vốn đầu tư, hiện đại hóa được sản xuất và cơ sở hạ tầng", "D": "khai thác tiềm năng, hạn chế thiên tai và hiện đại hóa sản xuất"}, "correct": "A"}, {"id": 19, "text": "Duyên hải Nam Trung Bộ có thế mạnh về ngành giao thông vận\ntải đường biển chủ yếu là do", "options": {"A": "nằm gần tuyến hàng hải quốc tế, nhiều vụng, vịnh kín gió", "B": "nhiều vụng, vịnh kín gió, hoạt động nội thương phát triển", "C": "có nhiều ngư trường trọng điểm, đảo nằm ven bờ, đầm phá", "D": "có đường bờ biển dài, ít cửa sông đổ ra biển và vụng, vịnh"}, "correct": "A"}, {"id": 20, "text": "Điều kiện thuận lợi để Duyên hải Nam Trung Bộ phát triển\nnuôi trồng thủy sản là", "options": {"A": "có nhiều ngư trường trọng điểm", "B": "vùng biển rộng, nhiều thủy sản", "C": "ven biển có các vụng, đầm phá", "D": "tỉnh nào cũng có bãi cá, bài tôm"}, "correct": "C"}, {"id": 21, "text": "Điều kiện nào sau đây thuận lợi để xây dựng các cảng nước\nsâu ở vùng Duyên hải Nam Trung Bộ?", "options": {"A": "Có nhiều vịnh biển sâu kín gió, hàng năm ít bị bồi lắng phù sa", "B": "Đường bờ biển kéo dài, có nhiều cửa sông lớn, nhiều bãi triều", "C": "Có nhiều đảo ven bở, nhiều vùng, vịnh nước sâu, có đầm phá", "D": "Tất cả các tỉnh đểu giáp biển, đường bờ biển kéo dài, có sông"}, "correct": "A"}, {"id": 22, "text": "Biện pháp chủ yếu để giải quyết vấn đề thực phẩm cho vùng\nDuyên hải Nam Trung Bộ là", "options": {"A": "phát triển ngành chăn nuôi gia súc", "B": "tăng cường nhập khẩu thực phẩm", "C": "đẩy mạnh công nghiệp chế biến hải sản", "D": "đẩy mạnh hoạt động nuôi trồng thủy sản"}, "correct": "D"}, {"id": 23, "text": "Dịch vụ hàng hải ở Duyên hải Nam Trung Bộ phát triển mạnh\ntrong thời gian gần đây chủ yếu do", "options": {"A": "bờ biển dài, nhiều vịnh biển sâu, gần các tuyến hàng hải quốc tế", "B": "các tỉnh đều giáp biển, đô thị lớn ở ven biển, hạ tầng hoàn thiện", "C": "kinh tế phát triển, mức sống cải thiện, hội nhập quốc tế sâu rộng", "D": "công nghiệp phát triển, lao động đông đảo, thu hút nhiều vốn đầu tư"}, "correct": "C"}, {"id": 24, "text": "Hoạt động nào sau đây tạo ra nhiều sản phẩm hàng hóa nhất\ncho vùng Duyên hải Nam Trung Bộ?", "options": {"A": "Chăn nuôi trâu bò và gia cầm", "B": "Đánh bắt và nuôi trồng thủy sản", "C": "Đẩy mạnh thâm canh lúa nước", "D": "Trồng, chế biến các loại rau quả"}, "correct": "B"}, {"id": 25, "text": "Ý nghĩa chủ yếu của việc phát triển sản xuất thủy sản ở\nDuyên hải Nam Trung Bộ là", "options": {"A": "tạo ra nhiều sản phẩm hàng hóa và giải quyết việc làm", "B": "tạo ra các nghề mới và làm thay đổi bộ mặt nông thôn", "C": "góp phần phát triển công nghiệp và phân hóa lãnh thổ", "D": "thu hút các nguồn đầu tư và chuyển dịch cơ cấu kinh tế"}, "correct": "A"}, {"id": 26, "text": "Phát biểu nào sau đây không đúng với ngành khai thác tài\nnguyên sinh vật biển ở Duyên hải Nam Trung Bộ?", "options": {"A": "Phát triển sớm và đang trở thành ngành kinh tế mũi nhọn", "B": "Giá trị sản xuất và sản lượng liên tục tăng, nhất là cá biển", "C": "Một số loài cá biển có giá trị kinh tế cao trong xuất khẩu", "D": "Việc chế biến và bảo quản hải sản đông lạnh rất hạn chế"}, "correct": "D"}, {"id": 27, "text": "Biện pháp chủ yếu để đẩy mạnh phát triển du lịch biển đảo ở\nDuyên hải Nam Trung Bộ là", "options": {"A": "nâng cấp các cơ sở lưu trú, khai thác mới tài nguyên", "B": "hoàn thiện cơ sở hạ tầng, đa dạng loại hình sản phẩm", "C": "nâng cao trình độ người lao động, tích cực quảng bá", "D": "thu hút dân cư tham gia, phát triển du lịch cộng đồng"}, "correct": "B"}, {"id": 28, "text": "Nghề làm muối phát triển mạnh ở Duyên hải Nam Trung Bộ chủ\nyếu do", "options": {"A": "ngư dân có nhiều kinh nghiệm làm muối", "B": "độ muối của biển cao hơn các vùng khác", "C": "Nhiều nắng, ít mưa và có ít cửa sông lớn", "D": "được Nhà nước quan tâm đầu tư nhiều"}, "correct": "C"}, {"id": 29, "text": "Phát biểu nào sau đây không đúng với Duyên hải Nam Trung Bộ?", "options": {"A": "Tất cả tỉnh/thành thuộc vùng kinh tế trọng điểm miền Trung", "B": "Dân số khá đông, nguồn lao động khá dồi dào, chịu khó", "C": "Cơ sở hạ tầng, cơ sở vật chất - kĩ thuật ngày càng hiện đại", "D": "Tỉ lệ dân đô thị cao, đô thị hoá và công nghiệp hoá nhanh"}, "correct": "A"}, {"id": 30, "text": "Giải pháp chủ yếu để tăng lượng khách du lịch quốc tế đến\nvới vùng Duyên hải Nam Trung Bộ là", "options": {"A": "tăng cường quảng bá hình ảnh du lịch, bảo vệ môi trường", "B": "bảo vệ môi trường, phát triển đa dạng các loại hình du lịch", "C": "phát triển đa dạng các loại hình du lịch, đầu tư cơ sở hạ tầng", "D": "đầu tư cơ sở hạ tầng, tăng cường quảng bá hình ảnh du lịch"}, "correct": "D"}, {"id": 31, "text": "Phát biểu nào sau đây không đúng với Duyên hải Nam Trung Bộ?", "options": {"A": "Có nhiều dân tộc, có lịch sử hình thành lãnh thổ lâu đời", "B": "Có nhiều nét đặc sắc về văn hoá và truyền thống sản xuất", "C": "Có nhiều tài nguyên du lịch văn hoá của vùng biển, đảo", "D": "Giao thông vận tải biển phát triển chậm do nhiều thiên tai"}, "correct": "D"}]}, "ds": [{"id": 1, "context": "Duyên hải Nam Trung Bộ là một bộ phận lãnh thổ của vùng Bắc Trung Bộ và\nDuyên hải miền Trung; giáp với vùng Đông Nam Bộ, Tây Nguyên; giáp với\nnước láng giềng Lào và Biển Đông rộng lớn. Lãnh thổ nằm gần tuyến hàng\nhải quốc tế, tạo cho Duyên hải Nam Trung Bộ nhiều tiềm năng, thế mạnh\ntrong phát triển các ngành kinh tế biển", "statements": [{"letter": "a", "text": "Kinh tế biển là tiềm năng nổi bật nhất trong phát triển của vùng Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "b", "text": "Duyên hải Nam Trung Bộ có ưu thế hơn Bắc Trung Bộ trong khai thác hải sản do có nhiều ngư trường lớn", "correct": true}, {"letter": "c", "text": "Điều kiện chủ yếu giúp Duyên hải Nam Trung Bộ phát triển khai thác hải sản là vùng biển rất ít khi có bão", "correct": false}, {"letter": "d", "text": "Khó khăn chủ yếu tác động đến ngành kinh tế biển của Duyên hải Nam Trung Bộ là chịu ảnh hưởng lớn của áp thấp nhiệt đới, gió mùa Đông Bắc", "correct": false}]}, {"id": 2, "context": "Duyên hải Nam Trung Bộ là một khu vực ven biển của Việt Nam với nhiều\ntài nguyên thiên nhiên phong phú. Vùng này có diện tích biển rộng lớn và\nnhiều ngư trường quan trọng. Bờ biển dài với nhiều vịnh sâu như Vân\nPhong, Cam Ranh và Đà Nẵng tạo điều kiện thuận lợi cho phát triển cảng\nbiển và du lịch. Các bãi biển nổi tiếng như Nha Trang, Mũi Né, Non Nước\nvà Mỹ Khê thu hút nhiều du khách. Khu vực này cũng có nhiều khu dự trữ\nsinh quyển và tài nguyên khoáng sản quý giá. Những yếu tố này tạo nền\ntảng vững chắc cho sự phát triển đa dạng của các ngành kinh tế biển\ntrong vùng", "statements": [{"letter": "a", "text": "Duyên hải Nam Trung Bộ là khu vực ven biển có nhiều bãi biển nổi tiếng như Nha Trang và Mũi Né", "correct": true}, {"letter": "b", "text": "Các vịnh sâu như Vân Phong, Cam Ranh và Đà Nẵng ở Duyên hải Nam Trung Bộ có ý nghĩa chủ yếu cho phát triển du lịch", "correct": false}, {"letter": "c", "text": "Khu vực Duyên hải Nam Trung Bộ có điều kiện tự nhiên thuận lợi để phát triển các ngành kinh tế biển đa dạng", "correct": true}, {"letter": "d", "text": "Sự phát triển của các ngành kinh tế biển tại Duyên hải Nam Trung Bộ phụ thuộc vào khả năng bảo vệ và khai thác bền vững tài nguyên thiên nhiên trong khu vực này", "correct": true}]}, {"id": 3, "context": "Duyên hải Nam Trung Bộ có vùng biển rộng, với nguồn lợi thủy sản phong\nphú; có nhiều bãi cá, bãi tôm và ngư trường lớn (Ninh Thuận - Bình\nThuận, quần đảo Hoàng Sa, quần đảo Trường Sa ); hệ sinh thái vùng biển,\nđảo đa dạng; nhiều vũng, vịnh, đầm phá. Đây là tiềm năng lớn cho phát\ntriển thủy sản với các hoạt động đánh bắt và nuôi trồng", "statements": [{"letter": "a", "text": "Thế mạnh lớn nhất về tài nguyên thiên nhiên vùng Duyên hải Nam Trung Bộ là tài nguyên biển", "correct": true}, {"letter": "b", "text": "Vấn đề quan trọng trong ngành thủy sản ở Duyên hải Nam Trung Bộ là khai thác hợp lí, bảo vệ nguồn lợi", "correct": true}, {"letter": "c", "text": "Hoạt động sản xuất thủy sản có ý nghĩa quan trọng trong việc xây dựng cơ cấu kinh tế, giải quyết việc làm cho Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "d", "text": "Để nâng cao hiệu quả kinh tế ngành thủy sản, Duyên hải Nam Trung Bộ cần khai thác, nuôi trồng kết hợp với chế biến và mở rộng thị trường", "correct": true}]}, {"id": 4, "context": "Duyên hải Nam Trung Bộ có nhiều điều thuận lợi để phát triển các ngành\nkinh tế; đường bờ biển dài, nhiều vịnh nước sâu, kín gió; bờ biển có các\nbãi tắm đẹp, khí hậu thuận lợi; vùng biển có các ngư trường trọng điểm.\nVùng biển và thềm lục địa có tiềm năng để phát triển công nghiệp khai\nthác dầu khí. Ven biển có nhiều điều kiện thuận lợi để sản xuất muối,\nkhai thác cát thuỷ tinh và ôxit ti tan", "statements": [{"letter": "a", "text": "Duyên hải Nam Trung Bộ có điều kiện để phát triển tổng hơp kinh tế biển", "correct": true}, {"letter": "b", "text": "Vùng biển và thềm lục địa Duyên hải Nam Trung Bộ có tiềm năng về dầu khí lớn lớn nhất nước ta", "correct": false}, {"letter": "c", "text": "Các ngư trường lớn ở Duyên hải Nam Trung Bộ có nhiều thuận lợi để nuôi trồng thủy sản", "correct": false}, {"letter": "d", "text": "Vấn đề ô nhiễm môi trường biển, suy giảm tài nguyên biển là thách thức lớn cho phát triển kinh tế biển ở Duyên hải Nam Trung Bộ", "correct": true}]}, {"id": 5, "context": "Tài nguyên biển là một lợi thế lớn của Duyên hải Nam Trung Bộ. Đường bờ\nbiển dài, điều kiện khí hậu thuận lợi đã tạo cho vùng có nguồn hải sản\nphong phú. Vùng có tổng trữ lượng hải sản lớn, với nhiều hải sản có giá\ntrị như tôm he, tôm hùm, cá mú, cá ngừ, ngọc trai,,", "statements": [{"letter": "a", "text": "Duyên hải Nam Trung Bộ có điều kiện nuôi nhiều loại hải sản có giá trị kinh tế cao", "correct": true}, {"letter": "b", "text": "Biện pháp nâng cao giá trị thủy sản nuôi trồng nước mặn của Duyên hải Nam Trung Bộ là mở rộng diện tích, đa dạng sản phẩm", "correct": false}, {"letter": "c", "text": "Biện pháp để đẩy mạnh đánh bắt xa bờ ở Duyên hải Nam Trung Bộ là tăng cường tàu thuyển, phương tiện hiện đại", "correct": true}, {"letter": "d", "text": "Sản xuất thủy sản có ý nghĩa quan trọng với Duyên hải Nam Trung Bộ trong việc tạo sản phẩm hàng hóa, giải quyết việc làm", "correct": true}]}, {"id": 6, "context": "Sản lượng thủy sản khai thác và nuôi trồng ở Duyên hải Nam Trung Bộ,\n\ngiai đoạn 2010 - 2023\n\n*(Đơn vị: nghìn tấn)*\n\n  \n  Năm                2010          2021          2023\n     \n  Khai thác              707,1             1167,9            1219,5\n\n  Nuôi trồng             80,8              101,3             109,6\n  \n\n*(Nguồn: Niên giám Thống kê Việt Nam 2023, NXB Thống kê 2024)", "statements": [{"letter": "a", "text": "Sản lượng thủy sản nuôi trồng giảm", "correct": false}, {"letter": "b", "text": "Sản lượng thủy sản khai thác tăng và cao hơn sản lượng hải sản nuôi trồng", "correct": true}, {"letter": "c", "text": "Sự thay đổi sản lượng thủy sản nuôi trồng là do có nhiều ngư trường trọng điểm lớn, nguồn lợi hải sản phong phú", "correct": false}, {"letter": "d", "text": "Sự thay đổi sản lượng thủy sản khai thác chủ yếu là do đẩy mạnh khai thác xa bờ, đầu tư tàu công suất lớn với trang thiết bị hiện đại", "correct": true}]}, {"id": 7, "context": "Duyên hải Nam Trung Bộ có đường bờ biển dài, nhiều vịnh nước sâu, kín\ngió như vịnh Dung Quất, Quy Nhơn, Vân Phong, Cam Ranh,\\... thích hợp xây\ndựng cảng biển nước sâu, phát triển giao thông vận tải biển", "statements": [{"letter": "a", "text": "Cảng trung chuyển quốc tế được xây dựng tại vịnh Vân Phong của Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "b", "text": "Duyên hải Nam Trung Bộ có lợi thế hơn Bắc Trung Bộ trong phát triển giao thông vận tải do vùng biển sâu, bờ biển cắt xẻ, nhiều vũng vịnh", "correct": true}, {"letter": "c", "text": "Vai trò to lớn của các cảng biển ở Duyên hải Nam Trung Bộ đối với Tây Nguyên là vận chuyển hàng hóa, giải quyết việc làm cho lao động", "correct": false}, {"letter": "d", "text": "Việc phát triển cơ sở hạ tầng giao thông trong đó có cảng biển góp phần quan trọng thu hút đầu tư nước ngoài, thúc đẩy tăng trưởng kinh tế", "correct": true}]}, {"id": 8, "context": "Sản lượng thủy sản khai thác và nuôi trồng vùng Duyên hải Nam Trung\nBộ,\n\ngiai đoạn 2018 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n  \n  Năm           2018          2020          2021\n     \n  Khai thác         1164,1            1245,1            1270,4\n\n  Nuôi trồng        91,3              100,3             101,5\n  \n\n*(Nguồn: Niên giám thống kê Việt Nam 2022)", "statements": [{"letter": "a", "text": "Biểu đồ tròn là dạng biểu đồ thích hợp nhất để thể hiện cơ cấu sản lượng thủy sản khai thác và nuôi trồng vùng Duyên hải Nam Trung Bộ qua các năm", "correct": true}, {"letter": "b", "text": "Sản lượng thủy sản khai thác luôn nhỏ hơn nuôi trồng", "correct": false}, {"letter": "c", "text": "Tốc độ tăng trưởng sản lượng nuôi trồng nhanh hơn khai thác", "correct": true}, {"letter": "d", "text": "Hoạt động nuôi trồng thủy sản đang được đẩy mạnh là do nhu cầu thị trường lớn", "correct": true}]}, {"id": 9, "context": "Tài nguyên khoáng sản biển nổi bật, có tiềm năng lớn ở Duyên hải Nam\nTrung Bộ là dầu mỏ và khí tự nhiên ở vùng thềm lục địa. Ngoài ra, còn có\ncát thủy tinh, ti tan ven biển Đà Nẵng, Khánh Hòa, Bình Định. Sản xuất\nmuối trong khu vực cũng có thuận lợi", "statements": [{"letter": "a", "text": "Hai cánh đồng muối lớn nhất ở Duyên hải Nam Trung Bộ thuộc Đà Nẵng và Khánh Hòa", "correct": false}, {"letter": "b", "text": "Tài nguyên khoáng sản tạo điều kiện thuận lợi cho Duyên hải Nam Trung Bộ phát triển đa dạng cơ cấu ngành công nghiệp", "correct": false}, {"letter": "c", "text": "Nghề làm muối phát triển mạnh ở Duyên hải Nam Trung Bộ chủ yếu do nhiều nắng, ít mưa, ít cửa sông", "correct": true}, {"letter": "d", "text": "Các nhân tố chủ yếu tác động đến phát triển công nghiệp ở Duyên hải Nam Trung Bộ là cơ sở năng lượng, vốn đầu tư, hạ tầng", "correct": true}]}, {"id": 10, "context": "Sản lượng hải sản khai thác tăng nhanh, chiếm trên dưới 90% tổng sản\nlượng hải sản của Duyên hải Nam Trung Bộ, chủ yếu là khai thác cá biển\n(năm 2021, sản lượng khai thác cá biển của Duyên hải Nam Trung Bộ là 996\nnghìn tấn), đặc biệt khai thác cá ngừ đại dương đã tạo nên sản phẩm xuất\nkhẩu chủ lực cho một số địa phương", "statements": [{"letter": "a", "text": "Thế mạnh tự nhiên thuận lợi nhất trong việc phát triển ngành đánh bắt thủy sản ở Duyên hải Nam Trung Bộ là có nhiều ngư trường", "correct": true}, {"letter": "b", "text": "Biện pháp nâng cao giá trị của hoạt động đánh bắt xa bờ ở Duyên hải Nam Trung Bộ là đầu tư tàu thuyền, phương tiện hiện đại", "correct": true}, {"letter": "c", "text": "Mục đích chủ yếu của việc đẩy mạnh đánh bắt xa bờ ở Duyên hải Nam Trung Bộ là giải quyết việc làm, bảo vệ môi trường", "correct": false}, {"letter": "d", "text": "Biện pháp chủ yếu nâng cao giá trị trong ngành đánh bắt thủy sản gần bờ ở Duyên hải Nam Trung Bộ là đẩy mạnh chế biến và tiêu thụ sản phẩm", "correct": true}]}, {"id": 11, "context": "Duyên hải Nam Trung Bộ có nhiều điều kiện thuận lợi để phát triển giao\nthông vận tải biển, nơi đây đã hình thành nhiều cảng biển loại I, II,\nIII và bến cảng nước sâu. Các cảng biển loại I là Đà Nẵng, Bình Định,\nKhánh Hoà; các bến cảng nước sâu gồm Dung Quất (Quảng Ngãi), Kỳ Hà\n(Quảng Nam), Nhơn Hội (Bình Định), Vân Phong (Khánh Hoà)", "statements": [{"letter": "a", "text": "Đà Nẵng là cảng tổng hợp quan trọng nhất ở vùng Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "b", "text": "Điều kiện thuận lợi nhất để Duyên hải Nam Trung Bộ xây dựng cảng nước sâu là có nhiều vịnh biển sâu, kín gió", "correct": true}, {"letter": "c", "text": "Thế mạnh nổi bật của Duyên hải Nam Trung Bộ trong phát triển giao thông vận tải biển so với Bắc Trung Bộ là vũng, vịnh nước sâu, gần tuyến hàng hải quốc tế", "correct": true}, {"letter": "d", "text": "Ý nghĩa chủ yếu của các cảng nước sâu ở Duyên hải Nam Trung Bộ là thúc đẩy chuyển dịch cơ cấu lãnh thổ kinh tế, phòng chống thiên tai", "correct": false}]}, {"id": 12, "context": "Diện tích và sản lượng hải sản nuôi trồng ở Duyên hải Nam Trung Bộ chiếm\ntỉ trọng không nhiều, nhưng tập trung vào những loại hải sản có giá trị\nkinh tế cao như: tôm hùm, đồi mồi, trai lấy ngọc, rong biển,\\...., Các\nđịa phương nuôi trồng hải sản nhiều nhất là Khánh Hoà, Phú Yên", "statements": [{"letter": "a", "text": "Thuận lợi chủ yếu của việc nuôi trồng thủy sản ở Duyên hải Nam Trung Bộ là bờ biển có nhiều vũng vịnh, đầm phá", "correct": true}, {"letter": "b", "text": "Duyên hải Nam Trung Bộ chủ yếu nuôi trồng thủy sản nước ngọt", "correct": false}, {"letter": "c", "text": "Biện pháp chủ yếu nâng cao giá trị thủy sản nuôi trồng nước mặn hiện nay ở Duyên hải Nam Trung Bộ là tăng cường chế biến, xuất khẩu", "correct": true}, {"letter": "d", "text": "Ý nghĩa chủ yếu của chế biến đối với nuôi trồng thủy sản ở Duyên hải Nam Trung Bộ là đa dạng sản phẩm, mở rộng sản xuất", "correct": false}]}, {"id": 13, "context": "Duyên hải Nam Trung Bộ có ngành khai thác tài nguyên sinh vật biển phát\ntriển sớm và đang trở thành ngành mũi nhọn của vùng. Nổi bật nhất là\nkhai thác hải sản, sản lượng khai thác tăng từ 707,1 nghìn tấn (năm\n2010) lên 1167,9 nghìn tấn (năm 2021). Trong đó, cá biển chiếm 82,7% sản\nlượng khai thác hải sản (năm 2021). Các tỉnh có sản lượng khai thác hải\nsản lớn là Quảng Ngãi, Bình Định, Bình Thuận, Ninh Thuận", "statements": [{"letter": "a", "text": "Nhiều tỉnh ở Duyên hải Nam Trung Bộ có sản lượng khai thác hải sản lớn", "correct": true}, {"letter": "b", "text": "Sản lượng hải sản khai thác tăng 460,8 nghìn tấn từ năm 2010 đến năm 2021", "correct": true}, {"letter": "c", "text": "Chỉ một số tỉnh/thành phố ở Duyên hải Nam Trung Bộ có khả năng phát triển hoạt động khai thác hải sản", "correct": false}, {"letter": "d", "text": "Cá biển có sản lượng gần 966 nghìn tấn (năm 2021)", "correct": true}]}, {"id": 14, "context": "Các loại hình du lịch biển được chú trọng phát triển là du lịch nghỉ\ndưỡng biển, khám phá tự nhiên (rạn san hô, cảnh quan biển đảo,\\...), lễ\nhội biển,\\... Các cơ sở lưu trú, cơ sở vui chơi giải trí ngày càng hiện\nđại. Du lịch biển của Duyên hải Nam Trung Bộ đang phát triển theo hướng\nxây dựng các khu du lịch, khu nghỉ dưỡng đạt tiêu chuẩn quốc tế, hướng\ntới phát triển du lịch bền vững", "statements": [{"letter": "a", "text": "Duyên hải Nam Trung Bộ có nhiều trung tâm du lịch nằm ở ven biển", "correct": true}, {"letter": "b", "text": "Hoạt động du lịch biển - đảo ở Duyên hải Nam Trung Bộ thu hút được nhiều khách du lịch quốc tế chủ yếu do đổi mới chính sách, hoàn thiện hạ tầng, nâng cao chất lượng dịch vụ", "correct": true}, {"letter": "c", "text": "Việc đa dạng các loại hình du lịch biển - đảo ở Duyên hải Nam Trung Bộ có ý nghĩa chủ yếu là khai thác thế mạnh, đáp ứng thị trường, tăng sự hấp dẫn", "correct": true}, {"letter": "d", "text": "Giải pháp để tăng lượng khách du lịch quốc tế đến với Duyên hải Nam Trung Bộ là tăng cường lao động, bảo vệ môi trường", "correct": false}]}, {"id": 15, "context": "Duyên hải Nam Trung Bộ có vùng biển rộng, nhiều ngư trường lớn. Đường bờ\nbiển dài với nhiều vịnh biển sâu như: vịnh Vân Phong, Cam Ranh, Đà\nNẵng....nhiều bãi biển đẹp như: Nha Trang, Non Nước, Mỹ Khê, Mũi Né...,\nnhiều đảo ven bờ, nhiều khu dự trữ sinh quyển và nhiều khoáng sản có giá\ntrị đã tạo điều kiện thuận lợi để vùng phát triển tổng hợp các ngành\nkinh tế biển", "statements": [{"letter": "a", "text": "Vùng biển rộng, nhiều vịnh sâu thuận lợi cho phát triển ngành khai thác khoáng sản", "correct": false}, {"letter": "b", "text": "Duyên hải Nam Trung Bộ có thế mạnh trong phát triển du lịch biển, đảo với sản phẩm du lịch đa dạng (Đúng)  c) Khai thác thủy sản là ngành kinh tế quan trọng nhất để đảm bảo sự phát triển bền vững", "correct": false}, {"letter": "c", "text": "Khai thác thủy sản là ngành kinh tế quan trọng nhất để đảm bảo sự phát triển bền vững", "correct": false}, {"letter": "d", "text": "Phát triển kinh tế biển là nền tảng quan trọng trong việc củng cố, hoàn thiện và phát triển an ninh quốc phòng của vùng và cả nước", "correct": true}]}, {"id": 16, "context": "Tập trung phát triển mạnh kinh tế biển kết hợp với bảo đảm quốc phòng an\nninh trên biển, nhất là các ngành như du lịch và dịch vụ biển; kinh tế\nhàng hải; khai thác dầu khí và các tài nguyên khoáng sản biển khác; nuôi\ntrồng và khai thác hải sản; công nghiệp ven biển; năng lượng tái tạo,\nnhất là năng lượng gió ven bờ và năng lượng gió ngoài khơi; các ngành\nkinh tế biển mới", "statements": [{"letter": "a", "text": "Du lịch biển - đảo ở Duyên hải Nam Trung Bộ ngày càng phát triển do khai thác tốt tài nguyên, thu hút đầu tư, nâng cấp cơ sở hạ tầng", "correct": true}, {"letter": "b", "text": "Hệ thống sân bay, cảng biển được phát triển mang lại ý nghĩa quan trọng cho Duyên hải Nam Trung Bộ trong quá trình hội nhập, nâng cao vị thế vùng", "correct": true}, {"letter": "c", "text": "Giải pháp phát triển giao thông vận tải biển ở Duyên hải Nam Trung Bộ là thu hút đầu tư, tăng cường cơ sở hạ tầng, phát triển kinh tế mở", "correct": true}, {"letter": "d", "text": "Các khu kinh tế ven biển được hình thành chủ yếu do việc mở rộng phát triển giao thông, thu hút nhiều lao động", "correct": false}]}, {"id": 17, "context": "Duyên hải Nam Trung Bộ đã chú trọng khai thác có hiệu quả các thế mạnh\nđể phát triển tổng hợp các ngành kinh tế biển. Hoạt động này có ý nghĩa\nquan trọng trong bảo vệ nguồn lợi sinh vật biển và môi trường sinh thái,\ntạo sức mạnh tổng hợp, củng cố an ninh quốc phòng trong vùng và cả nước", "statements": [{"letter": "a", "text": "Thế mạnh để phát triển tổng hợp kinh tế biển ở Duyên hải Nam Trung Bộ là nghề cá, du lịch biển, dịch vụ hàng hải, khai khoáng", "correct": true}, {"letter": "b", "text": "So với các vùng lãnh thổ khác Duyên hải Nam Trung Bộ có nhiều địa điểm tốt để xây dựng cảng biển nước sâu", "correct": true}, {"letter": "c", "text": "Ý nghĩa chủ yếu của việc phát triển tổng hợp kinh tế biển ở Duyên hải Nam Trung Bộ là tạo việc làm và xây dựng hệ thống đô thị lớn", "correct": false}, {"letter": "d", "text": "Giải pháp chủ yếu để phát triển tổng hợp kinh tế biển ở Duyên hải Nam Trung Bộ là mở rộng thị trường, xây dựng kinh tế liên hoàn, đầu tư công nghệ", "correct": true}]}, {"id": 18, "context": "Giao thông vận tải biển ở Duyên hải Nam Trung Bộ giữ vai trò quan trọng,\ntạo ra các quan hệ kinh tế trong nước và quốc tế. Ở đây có nhiều cảng\nbiển được xây dựng, các cảng biển quan trọng là: Đà Nẵng, Quảng Ngãi,\nBình Định, Khánh Hòa,\\", "statements": [{"letter": "a", "text": "Các nhân tố tác động đến sự phát triển của giao thông vận tải đường biển ở Duyên hải Nam Trung Bộ là ngoại thương, hội nhập toàn cầu", "correct": true}, {"letter": "b", "text": "Ý nghĩa chủ yếu của phát triển dịch vụ hàng hải ở Duyên hải Nam Trung Bộ là thúc đẩy xuất nhập khẩu hàng hóa và hình thành khu kinh tế ven biển", "correct": true}, {"letter": "c", "text": "Thế mở cửa của Duyên hải Nam Trung Bộ hiện nay có nhiều thuận lợi chủ yếu do lao động có trình độ cao", "correct": false}, {"letter": "d", "text": "Giải pháp quan trọng để phát triển giao thông biển ở Duyên hải Nam Trung Bộ là thu hút đầu tư, tăng cường cơ sở hạ tầng, phát triển nền kinh tế mở", "correct": true}]}, {"id": 19, "context": "Vùng Duyên hải Nam Trung Bộ có vị trí địa lý kinh tế rất thuận lợi, nằm\ntrên các trục giao thông đường bộ, đường sắt, đường hàng không và đường\nbiển, gần khu tam giác kinh tế trọng điểm miền Đông Nam Bộ; cửa ngõ\ncủa Tây Nguyên, của đường xuyên Á ra biển nối với đường hàng hải quốc\ntế", "statements": [{"letter": "a", "text": "Hai tuyến đường theo hướng Bắc - Nam quan trọng nhất đi qua Duyên hải Nam Trung Bộ là quốc lộ 1 và đường sắt Thống Nhất", "correct": true}, {"letter": "b", "text": "Việc phát triển cơ sở hạ tầng giao thông ở Duyên hải Nam Trung Bộ nhằm khai thác triệt để các tài nguyên thiên nhiên", "correct": false}, {"letter": "c", "text": "Việc phát triển hạ tầng giao thông, nâng cao chất lượng lao động của Duyên hải Nam Trung Bộ đã thúc đẩy sự phân công lao động mới của vùng", "correct": true}, {"letter": "d", "text": "Phát triển các tuyến đường ngang nối lên Tây Nguyên giúp Duyên hải Nam Trung Bộ tăng liên kết, mở rộng hậu phương cảng", "correct": true}]}, {"id": 20, "context": "Sản lượng thủy sản ở Bắc Trung Bộ và Duyên hải Nam Trung Bộ, năm\n2023\n\n*(Đơn vị: nghìn tấn)*\n\n  \n  Vùng       Bắc Trung Bộ          Duyên hải Nam Trung Bộ\n    \n  Nuôi trồng     204,182                   109,654\n\n  Khai thác      541,564                   1219,542\n  \n\n*(Nguồn: Niên giám thống kê 2023, NXB Thống kê Việt Nam, 2023)", "statements": [{"letter": "a", "text": "Sản lượng thủy sản của Duyên hải Nam Trung Bộ cao hơn Bắc Trung Bộ", "correct": true}, {"letter": "b", "text": "Tỉ trọng thủy sản khai thác trong tổng sản lượng thủy sản ở Bắc Trung Bộ cao hơn Duyên hải Nam Trung Bộ", "correct": false}, {"letter": "c", "text": "Duyên hải Nam Trung Bộ có sản lượng thủy sản khai thác cao do có nhiều ngư trường lớn, điều kiện đánh bắt thuận lợi, tàu thuyền công suất lớn", "correct": true}, {"letter": "d", "text": "Biểu đồ cột là dạng biểu đồ thích hợp nhất để so sánh quy mô sản lượng thủy sản ở Bắc Trung Bộ với Duyên hải Nam Trung Bộ, năm 2023", "correct": true}]}, {"id": 21, "context": "Vùng Duyên hải Nam Trung Bộ có tiềm năng về điện Mặt Trời, điện gió với\nmật độ năng lượng khoảng 400 - 600W/m^2^ và điện sóng với năng lượng\nsóng 20 - 30 kw/m^2^. Tính đến cuối tháng 6/2019, cả nước có 89 nhà máy\nđiện gió và Mặt Trời, với tổng công suất đạt 4 543,8 MW, riêng 2 tỉnh\nNinh Thuận và Bình Thuận hiện có 38 nhà máy điện gió, Mặt Trời với tổng\ncông suất đạt 2 027 MW", "statements": [{"letter": "a", "text": "Ninh Thuận và Bình Thuận là hai tỉnh phát triển điện tái tạo mạnh nhất vùng Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "b", "text": "Việc đảm bảo cơ sở năng lượng sẽ giúp cho Duyên hải Nam Trung Bộ đẩy mạnh phát triển ngành công nghiệp", "correct": true}, {"letter": "c", "text": "Tài nguyên năng lượng của Duyên hải Nam Trung Bộ khá dồi dào, chủ yếu là năng lượng hóa thạch", "correct": false}, {"letter": "d", "text": "Hiện tại, để đáp ứng nhu cầu năng lượng cho phát triển kinh tế ở Duyên hải Nam Trung Bộ chủ yếu sử dụng nguồn năng lượng tái tạo mà không phụ thuộc vào mạng lưới điện quốc gia", "correct": false}]}, {"id": 22, "context": "Nhà máy lọc dầu Dung Quất ở tỉnh Quảng Ngãi, là trung tâm chế biến dầu\nkhí lớn của nước ta và có ý nghĩa rất quan trọng trong tiêu thụ nguyên\nliệu tại chỗ khi tài nguyên khí tự nhiên ở vùng thềm lục địa được khai\nthác", "statements": [{"letter": "a", "text": "Cảng nước sâu Dung Quất ở Quảng Ngãi gắn liền với nhà máy lọc dầu", "correct": true}, {"letter": "b", "text": "Phát triển các cảng biển gắn với việc xây dựng khu kinh tế biển, khu chế xuất ở Duyên hải Nam Trung Bộ góp phần thu hút đầu tư, phát triển kinh tế", "correct": true}, {"letter": "c", "text": "Việc xây dựng, nâng cấp hệ thống cảng biển góp phần tạo thế mở cửa cho Duyên hải Nam Trung Bộ", "correct": true}, {"letter": "d", "text": "Vai trò chủ yếu của việc thu hút đầu tư nước ngoài ở Duyên hải Nam Trung Bộ là thúc đẩy hình thành các khu đô thị ven biển", "correct": false}]}], "tln": [{"id": 1, "question": "Cho bảng số liệu:\n\nDiện tích và sản lượng lúa ở các vùng của nước ta, năm 2021\n\n  -----------------------------------------------------------------------\n  Vùng                         Diện tích      Sản lượng\n                                   *(nghìn ha)*       *(nghìn tấn)*\n  -------------------------------- ------------------ -------------------\n  Đồng bằng sông Hồng              970,3              6020,4\n\n  Trung du và miền núi Bắc Bộ      662,2              3426,5\n\n  Bắc Trung Bộ và Duyên hải Nam    1198,7             7200,2\n  Trung Bộ                                            \n\n  Tây Nguyên                       250,2              1466,3\n\n  Đông Nam Bộ                      258,9              1411,8\n\n  Đồng bằng sông Cửu Long          3898,6             24327,3\n  -----------------------------------------------------------------------\n\nTính năng suất lúa của Bắc Trung Bộ và Duyên hải Nam Trung Bộ năm 2021\n*(làm tròn kết quả đến hàng đơn vị của tạ/ha)", "answer": "7200,2 : 1198,7 = 6,006674 tấn/ha ≈ 60 tạ/ha", "explanation": "Đáp án: 7200,2 : 1198,7 = 6,006674 tấn/ha ≈ 60 tạ/ha"}, {"id": 2, "question": "Cho bảng số liệu:\n\nSản lượng hải sản khai thác của Duyên hải Nam Trung Bộ giai đoạn\n2010 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n+---------------------------+---------+----------+---------+---------+\n| Năm                   | *       | 2015 | *       | *       |\n|                           | *2010 |          | *2020 | *2021 |\n| Tiêu chí              |         |          |         |         |\n+===========================+=========+==========+=========+=========+\n| Sản lượng hải sản khai    | 707,1   | 913,6    | 1 144,8 | 1 167,9 |\n| thác                      |         |          |         |         |\n+---------------------------+---------+----------+---------+---------+\n| Trong đó: Cá biển         | 516,9   | 721,9    | 940,4   | 966,0   |\n+---------------------------+---------+----------+---------+---------+\n\n*(Nguồn: Tổng cục Thống kê năm 2011, năm 2022)*\n\nSản lượng cá biển so với sản lượng hải sản khai thác năm 2021 chiếm bao\nnhiêu %? *(làm tròn kết quả đến số thập phân thứ nhất của %)", "answer": "(966,0 : 1167,9) x 100 ≈ 82,7", "explanation": "Đáp án: (966,0 : 1167,9) x 100 ≈ 82,7"}, {"id": 3, "question": "Cho bảng số liệu:\n\nSản lượng hải sản khai thác của Duyên hải Nam Trung Bộ giai đoạn\n2010 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n+---------------------------+---------+----------+---------+---------+\n| Năm                   | *       | 2015 | *       | *       |\n|                           | *2010 |          | *2020 | *2021 |\n| Tiêu chí              |         |          |         |         |\n+===========================+=========+==========+=========+=========+\n| Sản lượng hải sản khai    | 707,1   | 913,6    | 1 144,8 | 1 167,9 |\n| thác                      |         |          |         |         |\n+---------------------------+---------+----------+---------+---------+\n| Trong đó: Cá biển         | 516,9   | 721,9    | 940,4   | 966,0   |\n+---------------------------+---------+----------+---------+---------+\n\n*(Nguồn: Tổng cục Thống kê năm 2011, năm 2022)*\n\nSản lượng cá biển khai thác của Duyên hải Nam Trung Bộ năm 2021 so với\nnăm 2010 tăng thêm bao nhiêu %? *(làm tròn kết quả đến số thập phân thứ\nnhất của %)", "answer": "(966,0 - 516,9) : 516,9 x 100 ≈ 86,9", "explanation": "Đáp án: (966,0 - 516,9) : 516,9 x 100 ≈ 86,9"}, {"id": 4, "question": "Duyên hải Nam Trung Bộ có số dân 9,4 triệu người, tỉ lệ gia\ntăng dân số ở mức 0,96% (năm 2021). Tính số dân tăng thêm của vùng Duyên\nhải Nam Trung Bộ năm 2021. *(làm tròn kết quả đến chữ số thập phân thứ\nhai của triệu người)", "answer": "(0,96 x 9,4) : 100 ≈ 0,09", "explanation": "Đáp án: (0,96 x 9,4) : 100 ≈ 0,09"}, {"id": 5, "question": "Cho bảng số liệu:\n\nSản lượng hải sản khai thác của Duyên hải Nam Trung Bộ giai đoạn\n2010 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n  ------------------------------------- ---------- ---------- ---------- ----------\n  Năm                               2010   2015   2020   2021\n\n  Sản lượng hải sản khai thác           707,1      913,6      1144,8     1167,9\n  ------------------------------------- ---------- ---------- ---------- ----------\n\n*(Nguồn Tổng cục Thống kê năm 2021, 2022)*\n\nTính tốc độ tăng trưởng sản lượng hải sản khai thác của Duyên hải Nam\nTrung Bộ giai đoạn 2010 - 2021 (coi năm 2010 = 100%). *(làm tròn kết quả\nđến hàng đơn vị của %)", "answer": "(1167,9 : 707,1) x 100 ≈ 165", "explanation": "Đáp án: (1167,9 : 707,1) x 100 ≈ 165"}, {"id": 6, "question": "Cho bảng số liệu:\n\nDiện tích và sản lượng lúa ở các vùng của nước ta, năm 2021\n\n  -----------------------------------------------------------------------\n  Vùng                         Diện tích      Sản lượng\n                                   *(nghìn ha)*       *(nghìn tấn)*\n  -------------------------------- ------------------ -------------------\n  Đồng bằng sông Hồng              970,3              6020,4\n\n  Trung du và miền núi Bắc Bộ      662,2              3426,5\n\n  Bắc Trung Bộ và Duyên hải Nam    1198,7             7200,2\n  Trung Bộ                                            \n\n  Tây Nguyên                       250,2              1466,3\n\n  Đông Nam Bộ                      258,9              1411,8\n\n  Đồng bằng sông Cửu Long          3898,6             24327,3\n  -----------------------------------------------------------------------\n\nSản lượng lúa của Bắc Trung Bộ và Duyên hải Nam Trung Bộ cao hơn của\nTrung du và miền núi Bắc Bộ bao nhiêu lần? *(làm tròn kết quả đến số\nthập phân thứ nhất)", "answer": "7200,2 : 3426,5 ≈ 2,1", "explanation": "Đáp án: 7200,2 : 3426,5 ≈ 2,1"}, {"id": 7, "question": "Năm 2021, Duyên hải Nam Trung Bộ có diện tích 45 nghìn km^2^,\ndân số 9,4 triệu người. Tính mật độ dân số của vùng năm 2021", "answer": "9400 : 45 ≈ 209", "explanation": "Đáp án: 9400 : 45 ≈ 209"}, {"id": 8, "question": "Cho bảng số liệu:\n\nSản lượng hải sản khai thác của Duyên hải Nam Trung Bộ, giai đoạn\n2010 - 2023\n\n*(Đơn vị: nghìn tấn)*\n\n  --------------------------------------------------------------------------------\n  Năm                              2010   2015   2020   2023\n  ------------------------------------ ---------- ---------- ---------- ----------\n  Sản lượng hải sản khai thác          707,1      913,6      1144,8     1219,5\n\n  --------------------------------------------------------------------------------\n\n*(Nguồn Tổng cục Thống kê năm 2023)*\n\nCho biết sản lượng hải sản khai thác của Duyên hải Nam Trung Bộ năm 2023\ntăng thêm bao nhiêu % so với năm 2010? *(làm tròn kết quả đến số thập\nphân thứ nhất của %)", "answer": "(1219,5 - 707,1) : 707,1 x 100 ≈ 72,5", "explanation": "Đáp án: (1219,5 - 707,1) : 707,1 x 100 ≈ 72,5"}, {"id": 9, "question": "Cho bảng số liệu:\n\nSản lượng hải sản khai thác của Duyên hải Nam Trung Bộ giai đoạn\n2010 - 2021\n\n*(Đơn vị: nghìn tấn)*\n\n  ------------------------------------- ---------- ---------- ---------- ----------\n  Năm                               2010   2015   2020   2021\n\n  Sản lượng hải sản khai thác           707,1      913,6      1144,8     1167,9\n  ------------------------------------- ---------- ---------- ---------- ----------\n\n*(Nguồn Tổng cục Thống kê năm 2021, 2022)*\n\nCho biết sản lượng hải sản khai thác của Duyên hải Nam Trung Bộ giai\nđoạn 2010 - 2021 tăng gấp bao nhiêu lần *(làm tròn kết quả đến chữ số\nthập phân thứ nhất)", "answer": "1167,9 : 707,1 ≈ 1,7", "explanation": "Đáp án: 1167,9 : 707,1 ≈ 1,7"}]}, "bai23": {"name": "Tây Nguyên", "mcq": {"nhan_biet": [{"id": 1, "text": "Phát biểu nào sau đây không đúng với vùng Tây Nguyên?", "options": {"A": "Giáp Lào, Biển Đông, Đồng bằng sông Cửu Long", "B": "Giáp hai nước Lào, Cam-pu-chia và Đông Nam Bộ", "C": "Có vị trí chiến lược quan trọng về đối ngoại, an ninh", "D": "Giao lưu thuận lợi với vùng Duyên hải Nam Trung Bộ"}, "correct": "A"}, {"id": 2, "text": "Khoáng sản có giá trị lớn nhất ở Tây Nguyên là", "options": {"A": "a-pa-tit", "B": "bô-xít", "C": "quặng sắt", "D": "quặng đồng"}, "correct": "B"}, {"id": 3, "text": "Số lượng các tỉnh thuộc vùng Tây Nguyên là", "options": {"A": "5", "B": "6", "C": "7", "D": "8"}, "correct": "A"}, {"id": 4, "text": "Tỉnh có diện tích trồng cà phê nhiều nhất nước ta là", "options": {"A": "Kon Tum", "B": "Gia Lai", "C": "Đắk Lắk", "D": "Lâm Đồng"}, "correct": "C"}, {"id": 5, "text": "Thành phố nổi tiếng về cà phê có chất lượng cao ở Tây Nguyên\nlà", "options": {"A": "Kon Tum", "B": "Buôn Ma Thuột", "C": "Plây ku", "D": "Đà Lạt"}, "correct": "B"}, {"id": 6, "text": "Cây chè được trồng nhiều ở tỉnh nào sau đây của Tây Nguyên?", "options": {"A": "Kon Tum", "B": "Đắk Nông", "C": "Đắk lắk", "D": "Lâm Đồng"}, "correct": "D"}, {"id": 7, "text": "Tây Nguyên không tiếp giáp với", "options": {"A": "Duyên hải Nam Trung Bộ", "B": "Đông Nam Bộ", "C": "Lào và Cam-pu-chia", "D": "Biển Đông"}, "correct": "D"}, {"id": 8, "text": "Cây công nghiệp lâu năm nào sau đây quan trọng nhất của Tây\nNguyên?", "options": {"A": "Chè", "B": "Cao su", "C": "Hồ tiêu", "D": "Cà phê"}, "correct": "D"}, {"id": 9, "text": "Nhà máy thủy điện nào sau đây có công suất lớn nhất ở Tây\nNguyên?", "options": {"A": "Yaly", "B": "Buôn Kuốp", "C": "Xrê Pôk 3", "D": "Đồng Nai 4"}, "correct": "A"}, {"id": 10, "text": "Vùng chuyên canh cà phê lớn nhất của nước ta là", "options": {"A": "Bắc Trung Bộ", "B": "Đồng Bằng Sông Hồng", "C": "Duyên Hải Nam Trung Bộ", "D": "Tây Nguyên"}, "correct": "D"}, {"id": 11, "text": "Hoạt động kinh tế phát triển mạnh ở Tây Nguyên hiện nay là", "options": {"A": "phát triển cây ăn quả và lương thực", "B": "chăn nuôi trâu, nuôi trồng thuỷ sản", "C": "trồng các cây công nghiệp lâu năm", "D": "tập trung khai thác gỗ, khoáng sản"}, "correct": "C"}, {"id": 12, "text": "Phát biểu nào sau đây đúng với Tây Nguyên?", "options": {"A": "Các vùng đất badan và đất phù sa sông rất rộng lớn", "B": "Các cao nguyên badan rộng lớn ở độ cao khác nhau", "C": "Sản xuất hoàn toàn thâm canh, sử dụng nhiều vật tư", "D": "Có các đô thị quy mô lớn với công nghiệp chế biến"}, "correct": "B"}, {"id": 13, "text": "Phát biểu nào sau đây không đúng về phát triển thuỷ điện ở Tây Nguyên?", "options": {"A": "Vùng đã khai thác và phát triển thuỷ điện khá sớm", "B": "Tổng sản lượng thuỷ điện của vùng dẫn đầu cả nước", "C": "Tập trung trên các sông Sê San, Srê Pôk, Đồng Nai", "D": "Tổng công suất các nhà máy ở sông Sê San lớn nhất"}, "correct": "B"}, {"id": 14, "text": "Phát biểu nào sau đây không đúng về khai thác bô-xít ở Tây Nguyên?", "options": {"A": "Bước đầu đã áp dụng công nghệ tiên tiến", "B": "Sản lượng, năng suất ngày càng tăng lên", "C": "Làm cơ sở sản xuất nhôm cho nước ta", "D": "Phân bố sản xuất rộng khắp trong vùng"}, "correct": "D"}, {"id": 15, "text": "Biểu hiện nào sau đây chứng minh Tây Nguyên là vùng trọng\nđiểm cà phê số một của nước ta?", "options": {"A": "Có nhiều giống cà phê năng suất cao", "B": "Áp dụng nhiều tiến bộ khoa học kĩ thuật", "C": "Diện tích và sản lượng lớn nhất cả nước", "D": "Nhà nước có nhiều chính sách ưu tiên"}, "correct": "C"}, {"id": 16, "text": "Người dân Tây Nguyên có nhiều kinh nghiệm trong", "options": {"A": "hoạt động thủ công nghiệp và công nghiệp", "B": "trồng, chế biến sản phẩm cây công nghiệp", "C": "thâm canh cây lương thực, nhất là lúa nước", "D": "nuôi trồng thuỷ sản; khai thác gỗ, lâm sản"}, "correct": "B"}, {"id": 17, "text": "Nhân tố được coi là có ảnh hưởng lớn nhất đến phân bố cây cà\nphê ở Tây Nguyên là", "options": {"A": "khí hậu cận xích đạo", "B": "đất đỏ badan", "C": "kinh nghiệm sản xuất", "D": "địa hình phân bậc"}, "correct": "B"}, {"id": 18, "text": "Phát biểu nào sau đây không đúng về điều kiện sinh thái nông\nnghiệp ở Tây Nguyên?", "options": {"A": "Các cao nguyên badan xếp tầng", "B": "Đất nâu đỏ đá vôi màu mỡ", "C": "Thiếu nước trong mùa khô", "D": "Có 2 mùa mưa, khô rõ rệt"}, "correct": "B"}, {"id": 19, "text": "Đặc điểm tự nhiên gây ra nhiều khó khăn nhất cho sản xuất\nnông nghiệp ở Tây Nguyên là", "options": {"A": "lượng mưa ít", "B": "mùa khô sâu sắc và kéo dài", "C": "sương muối, sương giá", "D": "địa hình phân bậc mạnh"}, "correct": "B"}, {"id": 20, "text": "Đặc điểm nào sau đây không đúng với khí hậu của Tây Nguyên?", "options": {"A": "Có tính chất cận xích đạo", "B": "Mưa tập trung vào thu đông", "C": "Có một mùa mưa và một mùa khô", "D": "Mùa khô sâu sắc và kéo dài"}, "correct": "B"}, {"id": 21, "text": "Phát biểu nào sau đây không đúng với tài nguyên thiên nhiên\ncủa vùng Tây Nguyên?", "options": {"A": "Đất đai màu mỡ", "B": "Khí hậu đa dạng, rừng còn nhiều", "C": "Nhiều khoáng sản", "D": "Trữ năng thủy điện tương đối lớn"}, "correct": "C"}, {"id": 22, "text": "Loại gia súc nào sau đây được nuôi phổ biến hơn cả ở Tây\nNguyên?", "options": {"A": "Trâu", "B": "Bò", "C": "Cừu", "D": "Ngựa"}, "correct": "B"}], "thong_hieu": [{"id": 1, "text": "Giải pháp nào sau đây không có tác dụng với việc bảo vệ rừng\nở Tây Nguyên?", "options": {"A": "Ngăn chặn nạn phá rừng, đốt rừng", "B": "Đẩy mạnh giao đất, giao rừng", "C": "Phát triển khai thác, chế biến gỗ", "D": "Khai thác hợp lí và trồng rừng"}, "correct": "C"}, {"id": 2, "text": "Tây Nguyên trở thành vùng chuyên canh cây công nghiệp lâu năm\nlớn do điều kiện chủ yếu nào sau đây?", "options": {"A": "Có nguồn nước tưới dồi dào", "B": "Đất badan tập trung thành vùng lớn", "C": "Khí hậu phân hóa theo độ cao", "D": "Khí hậu cận xích đạo với 2 mùa rõ rệt"}, "correct": "B"}, {"id": 3, "text": "Khó khăn lớn nhất trong phát triển cây cà phê ở Tây Nguyên\nhiện nay là", "options": {"A": "thiếu lao động có trình độ kỹ thuật cao", "B": "giống cây trồng cho năng suất chưa cao", "C": "thị trường xuất khẩu có nhiều biến động", "D": "công nghiệp chế biến chậm phát triển"}, "correct": "C"}, {"id": 4, "text": "Biện pháp chủ yếu để bảo vệ rừng ở Tây Nguyên là", "options": {"A": "mở rộng hình thức sản xuất trang trại", "B": "đẩy mạnh công tác giao đất giao rừng", "C": "ngăn chặn tình trạng du canh du cư", "D": "trồng nhiều cây công nghiệp lâu năm"}, "correct": "B"}, {"id": 5, "text": "Vấn đề cần chú ý trong phát triển thuỷ điện ở Tây Nguyên là", "options": {"A": "bảo vệ rừng, đất đai và điều tiết nước trong mùa lũ", "B": "giải quyết việc làm, nâng cao chất lượng cuộc sống", "C": "góp phần bảo vệ không gian văn hoá Cồng chiêng", "D": "kết hợp sản xuất điện và các hoạt động kinh tế khác"}, "correct": "A"}, {"id": 6, "text": "Điều kiện nào sau đây là thuận lợi chủ yếu để phát triển thủy\nđiện ở Tây Nguyên?", "options": {"A": "nhiều đồi núi và diện tích rừng rộng", "B": "khí hậu cận Xích đạo, đất badan tốt", "C": "nhiều cao nguyên độ cao khác nhau", "D": "có nhiều sông suối, lắm thác ghềnh"}, "correct": "D"}, {"id": 7, "text": "So với phần lớn các vùng trong cả nước, Tây Nguyên có", "options": {"A": "quy mô số dân nhỏ, tỉ lệ gia tăng dân số tự nhiên cao", "B": "cơ cấu dân số già, tỉ lệ dân số nhóm tuổi 15 - 64 thấp", "C": "mật độ dân số cao, tổng diện tích tự nhiên không lớn", "D": "tỉ lệ dân thành thị cao hơn nhiều so với dân nông thôn"}, "correct": "A"}, {"id": 8, "text": "Việc phát triển cây công nghiệp lâu năm ở Tây Nguyên chủ yếu\ndựa vào các điều kiện thuận lợi nào sau đây?", "options": {"A": "Khí hậu có tính chất cận xích đạo, đất badan giàu dinh dưỡng", "B": "Đất badan có diện tích rộng, giống cây trồng có chất lượng tốt", "C": "Đất badan ở trên những mặt bằng rộng, nguồn nước dồi dào", "D": "Khí hậu mát mẻ trên các cao nguyên cao trên 1000m, đất tốt"}, "correct": "A"}, {"id": 9, "text": "Giải pháp nào sau đây là quan trọng nhất để nâng cao giá trị\nsản xuất của cây công nghiệp ở Tây Nguyên?", "options": {"A": "Mở rộng thêm diện tích trồng trọt", "B": "Đẩy mạnh chế biến sản phẩm", "C": "Đa dạng hóa cơ cấu cây trồng", "D": "Quy hoạch các vùng chuyên canh"}, "correct": "B"}, {"id": 10, "text": "Vị trí địa lí là nhân tố gây nên khó khăn chủ yếu nào sau\nđây của Tây Nguyên?", "options": {"A": "Mùa khô kéo dài và rất sâu sắc", "B": "Không có khoáng sản", "C": "Tài nguyên rừng đang suy giảm", "D": "Trình độ lao động thấp"}, "correct": "A"}, {"id": 11, "text": "Phát biểu nào sau đây không phải là đặc điểm tự nhiên của\nTây Nguyên?", "options": {"A": "Khí hậu có tính chất cận xích đạo với một mùa mưa và một mùa khô kéo dài", "B": "Trữ năng thủy điện tập trung chủ yếu trên các dòng sông Sê San và Xrê Pôk", "C": "Độ che phủ rừng lớn nhưng thời gian gần đây đang bị suy giảm nghiêm trọng", "D": "Đất phù sa là chủ yếu và phân bố tập trung trên các cao nguyên bằng phẳng"}, "correct": "D"}, {"id": 12, "text": "Tây Nguyên có thể trồng được cây chè chủ yếu nhờ điều kiện\nnào sau đây?", "options": {"A": "đất ba-dan màu mỡ ở các cao nguyên rộng lớn", "B": "khí hậu nhiệt đới gió mùa quanh năm khá nóng", "C": "khí hậu mát mẻ ở các cao nguyên trên 1000 m", "D": "trong năm có mùa mưa và một mùa khô rõ rệt"}, "correct": "C"}, {"id": 13, "text": "Vấn đề đặt ra trong hoạt động chế biến lâm sản ở Tây Nguyên\nlà", "options": {"A": "phải chú trọng tới việc ngăn chặn nạn phá rừng", "B": "khai thác hợp lí đi đôi với khoanh nuôi, trồng rừng", "C": "chú trọng đẩy mạnh công tác giao đất, giao rừng", "D": "đẩy mạnh chế biến gỗ, hạn chế xuất khẩu gỗ tròn"}, "correct": "D"}, {"id": 14, "text": "Giải pháp chủ yếu để nâng cao hiệu quả kinh tế - xã hội của\ncây công nghiệp lâu năm ở Tây Nguyên là", "options": {"A": "mở rộng các hình thức sản xuất trang trại và hộ gia đình", "B": "sử dụng giống cây trồng phù hợp với điều kiện sinh thái", "C": "chuyên môn hoá sản xuất, đa dạng sản phẩm xuất khẩu", "D": "đa dạng hoá các loại cây trồng kết hợp với bảo vệ rừng"}, "correct": "C"}, {"id": 15, "text": "Một trong những vấn đề lớn đối với việc phát triển rừng ở\nTây Nguyên là", "options": {"A": "diện tích đất rừng ngày càng bị thu hẹp", "B": "công tác trồng rừng gặp nhiều khó khăn", "C": "tình trạng rừng bị chặt phá và cháy rừng", "D": "các vườn quốc gia bị khai thác bừa bãi"}, "correct": "C"}, {"id": 16, "text": "Giải pháp quan trọng nhất để tránh rủi ro trong việc mở rộng\ncác vùng sản xuất cây công nghiệp ở Tây Nguyên là", "options": {"A": "tìm thị trường xuất khẩu ổn định", "B": "quy hoạch lại các vùng chuyên canh", "C": "đa dạng hóa cơ cấu cây công nghiệp", "D": "đẩy mạnh khâu chế biến sản phẩm"}, "correct": "A"}, {"id": 17, "text": "Đặc điểm tự nhiên nào không phải của vùng Tây Nguyên?", "options": {"A": "Địa hình gồm các cao nguyên xếp tầng", "B": "Đất feralit trên đá ba dan màu mỡ", "C": "Khí hậu nhiệt đới ẩm gió mùa, ít phân hoá", "D": "Độ che phủ rừng bậc nhất cả nước"}, "correct": "C"}, {"id": 18, "text": "Phát biểu nào sau đây không đúng với đặc điểm sông ngòi ở\nTây Nguyên?", "options": {"A": "Tiềm năng giao thông đường sông lớn", "B": "Thuận lợi phát triển du lịch sinh thái", "C": "Xây dựng các nhà máy thủy điện", "D": "Nuôi trồng thủy sản nước ngọt"}, "correct": "A"}, {"id": 19, "text": "Thuận lợi để phát triển cây trồng có nguồn gốc nhiệt đới ở\nTây Nguyên là", "options": {"A": "các cao nguyên khá bằng phẳng, rộng với đất ba dan màu mỡ", "B": "các khối núi với sự phân hoá của cảnh quan tự nhiên, khí hậu", "C": "khí hậu mang tính chất cận Xích đạo, phân hoá theo mùa rõ rệt", "D": "có nhiều sông, thượng nguồn sông có trữ lượng thuỷ năng lớn"}, "correct": "C"}, {"id": 20, "text": "Tây Nguyên phát triển được các vùng chuyên canh cây công\nnghiệp quy mô lớn là nhờ lợi thế", "options": {"A": "khí hậu với nền nhiệt ẩm cao", "B": "khí hậu phân hóa theo đai cao", "C": "địa hình cao nguyên bằng phẳng", "D": "sinh vật phong phú, đa dạng"}, "correct": "C"}, {"id": 21, "text": "Ý nghĩa chủ yếu của việc đẩy mạnh chế biến sản phẩm cây công\nnghiệp ở Tây Nguyên là", "options": {"A": "nâng cao giá trị của nông sản", "B": "đa dạng hoá nguồn thu hoạch", "C": "sử dụng hợp lí các tài nguyên", "D": "thúc đẩy sản xuất chuyên canh"}, "correct": "A"}, {"id": 22, "text": "Phát biểu nào sau đây không đúng với phát triển lâm nghiệp ở\nTây Nguyên?", "options": {"A": "Đẩy mạnh khai thác và xuất khẩu gỗ tự nhiên", "B": "Sản lượng khai thác gỗ từ rừng trồng tăng lên", "C": "Chống nạn phá rừng, diện tích rừng trồng tăng", "D": "Chú trọng bảo vệ rừng và hoạt động lâm sinh"}, "correct": "A"}, {"id": 23, "text": "Thuận lợi để phát triển du lịch ở Tây Nguyên là", "options": {"A": "các cao nguyên khá bằng phẳng, rộng với đất ba-dan màu mỡ", "B": "các khối núi với sự phân hoá của cảnh quan tự nhiên, khí hậu", "C": "khí hậu mang tính chất cận Xích đạo, phân hoá theo mùa rõ rệt", "D": "nhiều hệ thống, thượng nguồn sông có trữ lượng thuỷ năng lớn"}, "correct": "B"}, {"id": 24, "text": "Thuận lợi về điều kiện kinh tế - xã hội ở Tây Nguyên không\nphải là", "options": {"A": "nguồn lao động dồi dào và tỉ lệ qua đào tạo ngày càng tăng", "B": "cơ sở hạ tầng và cơ sở vật chất kĩ thuật ngày càng hoàn thiện", "C": "công nghiệp khai thác, chế biến được đầu tư vốn, công nghệ", "D": "lao động có trình độ kĩ thuật cao, nhiều trung tâm kinh tế lớn"}, "correct": "D"}, {"id": 25, "text": "Hoạt động nào sau đây không phải để bảo vệ rừng ở Tây\nNguyên?", "options": {"A": "Thực hiện tốt việc giao đất, giao rừng đến hộ gia đình", "B": "Tăng cường khai thác rừng và đẩy mạnh xuất khẩu gỗ", "C": "Bảo vệ diện tích rừng tự nhiên hiện có, chống phá rừng", "D": "Chống nạn phá rừng tự nhiên và khai thác rừng bừa bãi"}, "correct": "B"}, {"id": 26, "text": "Ý nghĩa chủ yếu của việc đa dạng hóa cơ cấu cây công nghiệp\nở Tây Nguyên là", "options": {"A": "nâng cao chất lượng sản phẩm", "B": "tăng cao khối lượng nông sản", "C": "sử dụng hợp lí các tài nguyên", "D": "nâng cao đời sống người dân"}, "correct": "C"}, {"id": 27, "text": "Khi mở rộng các vùng chuyên canh cây công nghiệp ở Tây\nNguyên, vấn đề cần chú ý nhất là", "options": {"A": "không làm thu hẹp diện tích rừng", "B": "đầu tư mở rộng các nhà máy chế biến", "C": "xây dựng mạng lưới giao thông vận tải", "D": "tăng cường hợp tác với nước ngoài"}, "correct": "A"}, {"id": 28, "text": "Điều kiện tự nhiên thuận lợi cho sản xuất chè ở Tây Nguyên\nlà", "options": {"A": "có đất badan trên các cao nguyên rộng, khí hậu cận xích đạo", "B": "đất feralit trên nhiều loại đá mẹ, khí hậu phân hóa theo độ cao", "C": "mực nước ngầm phong phú, địa hình các cao nguyên xếp tầng", "D": "mạng lưới sông ngòi dày đặc, diện tích rừng còn tương đối lớn"}, "correct": "B"}, {"id": 29, "text": "Tây Nguyên có mật độ dân số thuộc nhóm thấp nhất ở nước ta\nchủ yếu do", "options": {"A": "thường xuyên chịu nhiều thiên tai", "B": "nông nghiệp là ngành kinh tế chính", "C": "hoạt động dịch vụ chưa đa dạng", "D": "hạ tầng hạn chế và chưa đồng bộ"}, "correct": "B"}, {"id": 30, "text": "Điều kiện tự nhiên nào sau đây gây khó khăn cho sản xuất\nnông nghiệp ở vùng Tây Nguyên?", "options": {"A": "Mùa khô sâu sắc, kéo dài dẫn đến thiếu nước", "B": "Chủ yếu là các hệ thống sông nhỏ, ngắn, dốc", "C": "Địa hình chia cắt mạnh, giao thông khó khăn", "D": "Địa hình đa dạng, có sự phân hóa theo độ cao"}, "correct": "A"}, {"id": 31, "text": "Lâm nghiệp là thế mạnh nổi bật ở vùng Tây Nguyên chủ yếu là\ndo", "options": {"A": "rừng cung cấp nhiều loại gỗ quý, dược liệu, các động vật", "B": "độ che phủ rừng lớn, rừng có ý nghĩa về kinh tế, sinh thái", "C": "rừng bảo vệ tài nguyên đất, cung cấp gỗ quý để xuất khẩu", "D": "rừng bảo vệ nhiều động vật hoang dã, cung cấp lâm sản"}, "correct": "B"}, {"id": 32, "text": "Biện pháp chủ yếu thúc đẩy sản xuất hàng hóa đối với cây\ncông nghiệp ở Tây Nguyên là", "options": {"A": "mở rộng thêm diện tích để trồng trọt", "B": "quy hoạch lại các vùng chuyên canh", "C": "mở rộng thị trường tiêu thụ sản phẩm", "D": "đa dạng hoá cơ cấu cây công nghiệp"}, "correct": "C"}, {"id": 33, "text": "Những vấn đề đáng lo ngại trong việc phát triển lâm nghiệp ở\nTây Nguyên là", "options": {"A": "có khai thác nhưng không có chế biến lâm sản", "B": "công tác trồng rừng không được thực hiện hàng năm", "C": "tình trạng rừng bị phá, bị cháy diễn ra thường xuyên", "D": "các vườn quốc gia là nơi đang bị khai thác bừa bãi"}, "correct": "C"}, {"id": 34, "text": "Nguyên nhân nào sau đây dẫn đến sự khác biệt trong cơ cấu\nsản phẩm nông nghiệp giữa Trung du và miền núi Bắc Bộ với Tây Nguyên ?", "options": {"A": "Trình độ thâm canh", "B": "Điều kiện về địa hình", "C": "Khí hậu và Đất đai", "D": "Tập quán sản xuất"}, "correct": "C"}, {"id": 35, "text": "Lợi thế chủ yếu để phát triển lâm nghiệp ở Tây Nguyên là", "options": {"A": "các cao nguyên khá bằng phẳng, rộng với đất ba dan màu mỡ", "B": "các khối núi với sự phân hoá của cảnh quan tự nhiên, khí hậu", "C": "khí hậu mang tính chất cận Xích đạo, phân hoá theo mùa rõ rệt", "D": "diện tích rừng lớn, tính đa dạng sinh học cao, nhiều loài gỗ quý"}, "correct": "D"}, {"id": 36, "text": "Các khu vực địa hình cao trên 1000 m có khí hậu mát mẻ là\nthuận lợi chủ yếu để Tây Nguyên", "options": {"A": "phát triển cây trồng có nguồn gốc cận nhiệt và phát triển du lịch", "B": "xây dựng các nhà máy thuỷ điện có quy mô nhỏ và quy mô vừa", "C": "tập trung phát triển hoạt động khai thác gỗ và các lâm sản quý", "D": "trồng các loại cây dược liệu và phát triển chăn nuôi gia súc lớn"}, "correct": "A"}, {"id": 38, "text": "Tác động tiêu cực của việc phát triển thủy điện ở Tây Nguyên\nlà", "options": {"A": "thời tiết và khí hậu biến đổi bất thường", "B": "tài nguyên rừng giảm sút nghiêm trọng", "C": "mở rộng diện tích nông nghiệp khó khăn", "D": "nhiều động vật có nguy cơ bị tuyệt chủng"}, "correct": "B"}], "van_dung": [{"id": 1, "text": "Việc phát triển các vùng chuyên canh cây công nghiệp lâu năm\nở Tây nguyên có ý nghĩa xã hội chủ yếu nào sau đây?", "options": {"A": "Giải quyết việc, tạo ra tập quán sản xuất mới", "B"
